    if(mo.dead || !onScreen(mo.x,mo.y,12)) continue;
    const k = MOB_KIND[mo.kind] || MOB_KIND.base;
    let frame;
    if(mo.kind==='gunner') frame = SPR.gunner;
    else if(mo.kind==='split') frame = SPR.split;
    else if(mo.kind==='rush') frame = SPR.rush;
    else frame = (Math.floor(mo.t*4)&1) ? SPR.mob2 : SPR.mob;
    ctx.save(); ctx.shadowColor=k.glow; ctx.shadowBlur=12;
    blit(frame, sx(mo.x), sy(mo.y)); ctx.restore();
  }
  // CRATES — bright golden chest with a glow + "!" beacon
  for(const cr of G.crates){
    if(cr.opened || !onScreen(cr.x,cr.y,16)) continue;
    const px_=sx(cr.x), py_=sy(cr.y);
    const frame = (Math.floor(cr.t*3)&1) ? SPR.crate2 : SPR.crate;
    ctx.save(); ctx.shadowColor='#fbbf24'; ctx.shadowBlur=10+4*Math.sin(cr.t);
    blit(frame, px_, py_); ctx.restore();
    // "!" beacon floating above
    if((G.t>>3)&1){
      ctx.save(); ctx.shadowColor='#fde047'; ctx.shadowBlur=4;
      glowText('!', px_-1, py_-14, '#fde047', 1, 6);
      ctx.restore();
    }
  }
  // boss spit (suckable, red-tinted)
  // ebullets — visual = suckability:
  //   junk-looking sprite → suckable (boss spit becomes cargo when sucked in)
  //   red projectile      → pure damage (gunner bullet, NOT suckable)
  for(const e of G.ebullets){
    if(!onScreen(e.x,e.y)) continue;
    const ex = sx(e.x), ey = sy(e.y);
    if(e.fromMob){
      const pulse = ((G.t + (e.t|0)) & 3) === 0;
      ctx.save(); ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 6;
      px(ex-2, ey-2, 4, 4, '#ef4444');
      px(ex-1, ey-1, 2, 2, '#fde047');
      ctx.restore();
      if(pulse){ ctx.save(); ctx.globalAlpha=0.6; px(ex-3, ey-3, 6, 6, '#fca5a5'); ctx.restore(); }
    } else {
      // boss spit — looks like junk because it really is suckable cargo
      px(ex-3, ey-3, 6, 6, 'rgba(248,113,113,0.18)');
      blit(SPR[JUNK[e.key].spr], ex, ey);
    }
  }
  // MISSILES — red warhead + flame tail (drawn in screen space)
  for(const m of G.missiles){
    if(!onScreen(m.x,m.y,12)) continue;
    const len=Math.hypot(m.vx,m.vy)||1, ux=m.vx/len, uy=m.vy/len, mx=sx(m.x), my=sy(m.y);
    for(let k=1;k<=4;k++){ px(mx-ux*k*2-1, my-uy*k*2-1, 2,2, k<2?'#fde047':(k<3?'#fb923c':'#f87171')); }
    ctx.save(); ctx.shadowColor='#ef4444'; ctx.shadowBlur=6;
    px(mx-2,my-2,4,4,'#ef4444'); ctx.restore();
    px(mx-1,my-1,2,2,'#fde047');
    if(m.warn>0 && (m.warn>>1&1)){ ctx.save(); ctx.globalAlpha=0.7; px(mx-3,my-3,6,6,'#fca5a5'); ctx.restore(); }
  }
  // FLAME ORBS (GOMILLA) — compressed junk core wrapped in orange flame
  for(const f of G.flameOrbs){
    if(!onScreen(f.x,f.y,12)) continue;
    const fx=sx(f.x), fy=sy(f.y);
    const pulse = (G.t + (f.t|0))*0.3;
    ctx.save();
    ctx.shadowColor='#fb923c'; ctx.shadowBlur=10;
    // outer flame
    px(fx-4, fy-4, 8, 8, '#ef4444');
    px(fx-3, fy-3, 6, 6, '#fb923c');
    // junk core
    px(fx-1, fy-1, 2, 2, '#94a3b8');
    // flicker sparks orbiting around the orb
    for(let i=0;i<3;i++){
      const a = pulse + i*2.1;
      px((fx+Math.cos(a)*7)|0, (fy+Math.sin(a)*7)|0, 1, 1, '#fde047');
    }
    ctx.restore();
  }

  // boss
  if(G.boss){
    const b=G.boss, bx=sx(b.x), by=sy(b.y);
    // PHASE 2 aimed-laser: telegraph line then bright lance
    if(b.phase>=2 && !b.dead && (b.laserT>0 || b.laserFire>0)){
      const ang = b.laserAng;
      const endX = bx + Math.cos(ang)*800;
      const endY = by + Math.sin(ang)*800;
      if(b.laserT>0){
        // Telegraph: fade-in red guide line, blink fast in last 8 frames
        let a = 0.15 + 0.55*(1 - b.laserT/50);
        if(b.laserT<=8 && (b.laserT>>1&1)) a = 0.9;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(endX,endY); ctx.stroke();
        ctx.restore();
      } else {
        // Fire: outer red + inner white-pink core, with glow
        ctx.save();
        ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 8;
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(endX,endY); ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#fee2e2'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(endX,endY); ctx.stroke();
        ctx.restore();
      }
    }
    // IRON HUSK dash telegraph: red guide line shown during dashT charge
    if(!b.dead && b.spr==='boss2' && b.dashT>0){
      const aDash = b.dashAng;
      const endX = bx + Math.cos(aDash)*900;
      const endY = by + Math.sin(aDash)*900;
      let a = 0.18 + 0.6*(1 - b.dashT/40);
      if(b.dashT<=8 && (b.dashT>>1&1)) a = 0.95;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.strokeStyle = '#fbbf24'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(endX,endY); ctx.stroke();
      ctx.restore();
    }
    if(b.dead && (b.dieT>>1&1)){}
    else if(onScreen(b.x,b.y,24)){
      // per-boss theme glow color, then phase 2 overrides with angry red pulse
      const themeGlow = { boss:'#e879f9', boss2:'#94a3b8', boss3:'#84cc16', boss4:'#22d3ee', boss5:'#fde047' };
      const isP2 = b.phase>=2;
      const glowCol = b.awake ? (isP2 ? '#ef4444' : (themeGlow[b.spr]||'#e879f9')) : '#3a4a55';
      const blur = b.awake ? (isP2 ? 16+4*Math.sin(G.t*0.3) : 14) : 6;

      /* ---- Phase 1 ambient flair (drawn UNDER the sprite for layering) ---- */
      if(b.awake){
        ctx.save();
        // JUNK CORE: 3-5 small junk pieces orbiting (damage-dealing satellites)
        if(b.spr==='boss'){
          const orbR = 22;
          for(let i=0;i<b.orbCount;i++){
            const a = b.orbAng + (i*Math.PI*2/b.orbCount);
            const ox = bx + Math.cos(a)*orbR;
            const oy = by + Math.sin(a)*orbR;
            ctx.shadowColor='#e879f9'; ctx.shadowBlur=6;
            px((ox-2)|0, (oy-2)|0, 4, 4, '#94a3b8');
            px((ox-1)|0, (oy-1)|0, 2, 2, '#c084fc');
          }
        }
        // IRON HUSK: random yellow glints on armor seams
        if(b.spr==='boss2'){
          if((G.t & 3) === 0){
            const gx = bx + (Math.random()-0.5)*22;
            const gy = by + (Math.random()-0.5)*16;
            ctx.shadowColor='#fde047'; ctx.shadowBlur=6;
            px((gx-1)|0, (gy-1)|0, 2, 2, '#fde047');
          }
        }
        // GOMILLA: dorsal fin pulse (green)
        if(b.spr==='boss3'){
          const p = 0.5 + 0.5*Math.sin(G.t*0.18);
          ctx.globalAlpha = 0.35 + 0.45*p;
          ctx.shadowColor='#84cc16'; ctx.shadowBlur=8;
          px(bx-1, by-18, 2, 4, '#84cc16');
          px(bx-1, by-22, 2, 3, '#bef264');
          ctx.globalAlpha = 1;
          // flame charging telegraph: red glow on mouth while flameT>0
          if(b.flameT>0){
            const fp = (b.flameT>>1) & 1;
            ctx.shadowColor='#ef4444'; ctx.shadowBlur=10;
            const fa = 0.5 + 0.5*(1 - b.flameT/30);
            ctx.globalAlpha = fp ? Math.min(1, fa+0.3) : fa;
            px(bx-2, by+2, 4, 4, '#ef4444');
            px(bx-1, by+3, 2, 2, '#fbbf24');
            ctx.globalAlpha = 1;
          }
        }
        // VOID LEVIATHAN: trailing tendril dots (orbiting + drift)
        if(b.spr==='boss4'){
          const tcount = b.phase>=2 ? 6 : 3;
          ctx.shadowColor='#a78bfa'; ctx.shadowBlur=6;
          for(let i=0;i<tcount;i++){
            const phase = (G.t*0.05) + i*0.9;
            const tr = 14 + Math.sin(phase)*4;
            const ta = i*1.7 + G.t*0.03;
            const tx = bx + Math.cos(ta)*tr;
            const ty = by + Math.sin(ta)*tr;
            ctx.globalAlpha = 0.5 + 0.3*Math.sin(phase);
            px((tx-1)|0, (ty-1)|0, 2, 2, i&1 ? '#a78bfa' : '#7c3aed');
          }
          ctx.globalAlpha = 1;
        }
        // PROGENITOR: 2 golden glyphs slowly orbiting
        if(b.spr==='boss5'){
          for(let i=0;i<2;i++){
            const a = G.t*0.025 + i*Math.PI;
            const gr = 26;
            const gx = bx + Math.cos(a)*gr;
            const gy = by + Math.sin(a)*gr;
            ctx.shadowColor='#fde047'; ctx.shadowBlur=8;
            px((gx-1)|0, (gy-1)|0, 2, 2, '#fde047');
            px((gx)|0, (gy)|0, 1, 1, '#fff');
          }
          // summon telegraph: golden ring pulse during summonT
          if(b.summonT>0){
            const sp = 1 - b.summonT/40;
            ctx.globalAlpha = 0.4 + 0.4*Math.sin(b.summonT*0.6);
            ctx.shadowColor='#fde047'; ctx.shadowBlur=10;
            ctx.strokeStyle='#fde047'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.arc(bx, by, 20 + sp*8, 0, Math.PI*2); ctx.stroke();
            ctx.globalAlpha = 1;
          }
        }
        ctx.restore();
      }

      // Sprite blit with optional teleport fade (VOID LEVIATHAN)
      const spriteAlpha = (b.spr==='boss4') ? (b.tpAlpha != null ? b.tpAlpha : 1) : 1;
      ctx.save();
      if(spriteAlpha < 1) ctx.globalAlpha = spriteAlpha;
      ctx.shadowColor=glowCol; ctx.shadowBlur=blur;
      // NG+ bosses are a menacing palette-swap (色違い)
      if(G.loop>=1) ctx.filter='hue-rotate(165deg) saturate(1.3) brightness(1.05)';
      // phase 2 swaps in the enraged variant (bossE / boss2E / ...) when one exists
      const bossSpr = (isP2 && SPR[b.spr+'E']) ? SPR[b.spr+'E'] : (SPR[b.spr]||SPR.boss);
      blit(bossSpr, bx, by);
      ctx.filter='none';
      ctx.restore();
      if(!b.awake){ ctx.save(); ctx.globalAlpha=0.5+0.3*Math.sin(G.t*0.1); glowText('?', bx-2, by-22, UI.amber,1,6); ctx.restore(); }

      /* ---- Phase 2 transformation overlays (drawn OVER the sprite) ---- */
      if(b.awake && isP2 && spriteAlpha > 0.2){
        ctx.save();
        // JUNK CORE: red cracks across the core
        if(b.spr==='boss'){
          ctx.shadowColor='#ef4444'; ctx.shadowBlur=6;
          ctx.strokeStyle='#ef4444'; ctx.lineWidth=1;
          const cseed = (G.t>>4) & 3;
          for(let k=0;k<3;k++){
            const ang = (cseed*1.7 + k*2.094);
            const r1 = 4, r2 = 10;
            ctx.beginPath();
            ctx.moveTo(bx+Math.cos(ang)*r1, by+Math.sin(ang)*r1);
            ctx.lineTo(bx+Math.cos(ang)*r2, by+Math.sin(ang)*r2);
            ctx.stroke();
          }
        }
        // IRON HUSK: dark cracks with red core peeking through
        if(b.spr==='boss2'){
          ctx.strokeStyle='#1f1f1f'; ctx.lineWidth=1;
          for(let k=0;k<5;k++){
            const ax = (Math.sin(G.t*0.03 + k*1.2))*10;
            ctx.beginPath();
            ctx.moveTo(bx-12+k*5, by-8); ctx.lineTo(bx-12+k*5+ax, by+8); ctx.stroke();
          }
          // red glow flickers from inside cracks
          if((G.t>>2)&1){
            ctx.shadowColor='#ef4444'; ctx.shadowBlur=8;
            px(bx-1, by-1, 2, 2, '#ef4444');
            px(bx+3, by+1, 2, 2, '#ef4444');
          }
        }
        // GOMILLA: red smoke rising from eyes
        if(b.spr==='boss3'){
          if((G.t & 7) === 0){
            smoke(b.x-3, b.y-12, 1);
            smoke(b.x+3, b.y-12, 1);
          }
        }
        // VOID LEVIATHAN: tendrils doubled (already handled via tcount in ambient)
        // (no extra overlay needed — ambient adapts)

        // PROGENITOR: dual golden aura rings
        if(b.spr==='boss5'){
          ctx.shadowColor='#fde047'; ctx.shadowBlur=10;
          ctx.strokeStyle='#fde047'; ctx.lineWidth=1;
          for(let r=0;r<2;r++){
            const pul = 1 + 0.15*Math.sin(G.t*0.12 + r*Math.PI);
            ctx.globalAlpha = 0.35 + 0.25*Math.cos(G.t*0.1 + r*1.3);
            ctx.beginPath(); ctx.arc(bx, by, (16 + r*8)*pul, 0, Math.PI*2); ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }
    }
    // HP bar with phase-2 half marker
    if(b.awake && !b.dead){
      const bw=LW-20;
      px(9,12,bw+2,5,UI.bg0); px(10,13,bw,3,UI.redDim);
      ctx.save(); ctx.shadowColor=UI.red; ctx.shadowBlur=6;
      px(10,13,Math.max(0,Math.round(bw*b.hp/b.hpMax)),3,UI.red); ctx.restore();
      // flash overlay when boss takes a hit
      if(G.bossHitFlash>0){
        ctx.save(); ctx.globalAlpha=Math.min(1,G.bossHitFlash/8);
        ctx.shadowColor='#fff'; ctx.shadowBlur=8;
        px(10,13,Math.max(0,Math.round(bw*b.hp/b.hpMax)),3,'#fff');
        ctx.restore();
      }
      // phase markers: 50% (enrage) and 25% (overdrive)
      px(10+Math.round(bw*0.5), 12, 1, 5, UI.amber);
      px(10+Math.round(bw*0.25), 12, 1, 5, '#e879f9');
      // phase indicator
      if(b.phase>=3){ const s='PH.3'; text(s, rightAlign(s, LW-4, 1), 18, '#e879f9', 1); }
      else if(b.phase>=2){ text('PH.2', rightAlign('PH.2', LW-4, 1), 18, UI.red, 1); }
    }
    // PHASE TRANSITION banner — flash for ~70 frames after entering phase 2
    if(b.phase>=2 && b.t>0 && b.spitCd>0 && b.spitCd<10 && (G.t>>1&1)){
      // (this fires briefly on the frame of transition); use a steadier banner via b.dieT-like timer instead
    }
  }
  // PHASE 2 BANNER — fills the screen briefly with a dramatic red strip
  if(G.phase2Banner>0 && G.boss){
    const t = G.phase2Banner, p = t/90;     // 1 -> 0 over the banner's life
    const p3 = G.bannerKind==='p3';
    const accent = p3 ? '#e879f9' : UI.red;
    const label  = p3 ? '!! OVERDRIVE !!' : '!! ENRAGED !!';
    // full-screen wash, fades out
    ctx.save(); ctx.globalAlpha = Math.min(0.55, p*0.7);
    ctx.fillStyle = p3 ? '#2a0a3a' : '#3a0a0a'; ctx.fillRect(0, 0, LW, LH); ctx.restore();
    // chevron-bordered banner strip — slides in from edges
    const slideIn = Math.min(1, (1-p)*4);    // 0 -> 1 in first quarter
    const by = LH/2 - 22;
    const stripW = LW * Math.min(1, slideIn);
    ctx.save();
    ctx.fillStyle = p3 ? 'rgba(58,8,80,0.92)' : 'rgba(80,8,8,0.92)';
    ctx.fillRect((LW-stripW)/2, by, stripW, 44);
    // top/bottom accent lines
    ctx.fillStyle = accent;
    ctx.fillRect((LW-stripW)/2, by, stripW, 1);
    ctx.fillRect((LW-stripW)/2, by+43, stripW, 1);
    ctx.restore();
    if(slideIn >= 0.9){
      // jittery flash on the text
      const jx = (G.t&3)===0 ? (Math.random()*2-1) : 0;
      ctx.save(); ctx.shadowColor = accent; ctx.shadowBlur = 14;
      glowCenter(label, by+8+jx, accent, 2, 14);
      ctx.restore();
      glowCenter(G.boss.name||'BOSS', by+30, UI.amberHi, 1, 6);
    }
  }

  // suction sparkles (around the roomba) — only when actually sucking (tank not full)
  const tankIsFull = G.cargo>=cargoCap();
  if(G.sucking && !tankIsFull && G.state==='play'){
    const nozX=sx(G.px), nozY=sy(G.py), RNG=suckRange();
    ctx.save();
    for(let i=0;i<14;i++){ const a=Math.random()*6.283, d=8+Math.random()*(RNG-8); ctx.globalAlpha=0.5*(1-d/RNG); px(nozX+Math.cos(a)*d, nozY+Math.sin(a)*d,1,1,UI.amber); }
    ctx.globalAlpha=0.15; ctx.strokeStyle=UI.amber; ctx.beginPath(); ctx.arc(nozX,nozY,RNG,0,6.283); ctx.stroke();
    ctx.restore();
  }
  // "FULL" prompt when the tank is maxed
  if(tankIsFull && G.state==='play' && (G.t>>3&1)){
    glowText('FULL', sx(G.px)-9, sy(G.py)-22, UI.red, 1, 8);
  }

  // player compressed shots — with a fading amber streak trail.
  // Visual scales with PWR level (pLv): bigger glow, brighter ring at high Lv.
  for(const sh of G.shots){
    for(let i=0;i<sh.trail.length;i++){
      const t=sh.trail[i], a=(i+1)/sh.trail.length;
      ctx.save(); ctx.globalAlpha=a*0.6;
      drawDisc(sx(t.x), sy(t.y), Math.max(1, Math.round(sh.r*a*0.8)), UI.amber);
      ctx.restore();
    }
    const x=sx(sh.x), y=sy(sh.y);
    const pLv = sh.pLv || 0;
    // Lv3+ outer "force-ring" ahead of the shot — alpha grows with PWR
    if(pLv >= 3){
      const ringR = sh.r + 3 + Math.min(3, pLv-2);
      ctx.save(); ctx.globalAlpha = 0.18 + (pLv-3)*0.10;
      ctx.strokeStyle = UI.amberHi; ctx.lineWidth = 1;
      ctx.shadowColor = UI.amberHi; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(x, y, ringR, 0, 6.283); ctx.stroke();
      ctx.restore();
    }
    // charged blast: pulsing outer halo so it reads as a heavy round
    if(sh.charged){
      ctx.save(); ctx.globalAlpha=0.30+0.15*Math.sin(G.t*0.5);
      ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.shadowColor=UI.amberHi; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(x,y, sh.r+3, 0, 6.283); ctx.stroke(); ctx.restore();
    }
    ctx.save(); ctx.shadowColor=UI.amberHi; ctx.shadowBlur = (sh.charged?22:14) + pLv*2;
    drawDisc(x,y, sh.r+1, UI.amberHi);
    drawDisc(x,y, sh.r-1, UI.amber);
    if(sh.charged) drawDisc(x,y, Math.max(1,sh.r-2), '#ffffff');   // white-hot core
    ctx.restore();
    drawDisc(x,y, Math.max(1,sh.r-3), sh.charged?'#caa400':'#7a4a08');
  }

  // particles — per-kind rendering
  for(const p of G.parts){
    const sz = p.kind==='ring' ? (p.maxR||30)+4 : 6;
    if(!onScreen(p.x,p.y,sz)) continue;
    const a = Math.max(0, p.life/(p.maxLife||16));
    if(p.kind==='ring'){
      ctx.save(); ctx.globalAlpha=a*0.75; ctx.strokeStyle=p.col; ctx.lineWidth=1;
      ctx.shadowColor=p.col; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(sx(p.x),sy(p.y),p.r,0,6.283); ctx.stroke();
      // inner faint ring for thickness
      if(a>0.4){ ctx.globalAlpha=a*0.35; ctx.beginPath(); ctx.arc(sx(p.x),sy(p.y),Math.max(1,p.r-2),0,6.283); ctx.stroke(); }
      ctx.restore();
    } else if(p.kind==='smoke'){
      ctx.save(); ctx.globalAlpha=a*0.45;
      drawDisc(sx(p.x), sy(p.y), Math.round(p.size||2), p.col); ctx.restore();
    } else if(p.kind==='spark'){
      if(p.trail){ for(let i=0;i<p.trail.length;i++){ const t=p.trail[i], ta=(i+1)/p.trail.length*a*0.7;
        ctx.save(); ctx.globalAlpha=ta; px(sx(t.x), sy(t.y), 1, 1, p.col); ctx.restore(); } }
      ctx.save(); ctx.shadowColor=p.col; ctx.shadowBlur=4; ctx.globalAlpha=a;
      px(sx(p.x)-1, sy(p.y)-1, 2, 2, p.col); ctx.restore();
    } else {
      const z = a>0.5?2:1;
      px(sx(p.x), sy(p.y), z, z, p.col);
    }
  }

  // roomba (blink while invulnerable). It "pops" outward each time it gulps a piece
  // of junk, then settles back — and once the tank is full it stays bulged (visual
  // only, no hitbox change).
  if(G.state!=='play' || G.invuln<=0 || (G.t>>2&1)){
    const puff = tankIsFull ? 1.22 : (1 + G.puff*0.40);   // big exaggerated pop per gulp
    if(puff!==1) blitScaled(shipMk(), sx(G.px), sy(G.py), puff);
    else blit(shipMk(), sx(G.px), sy(G.py));
  }
  if(G.sucking && !tankIsFull && G.state==='play'){ const x=sx(G.px),y=sy(G.py); px(x-1,y-1,2,2,(G.t>>1&1)?UI.amberHi:UI.amber); }
  // charge-shot ring — tightens inward as FIRE is held, flashes bright when full
  if(G.charging && G.chargeT>0 && G.state==='play'){
    const cx=sx(G.px), cy=sy(G.py), f=Math.min(1,G.chargeT/CHARGE_FULL), full=G.chargeT>=CHARGE_FULL;
    ctx.save();
    ctx.globalAlpha = full ? (0.55+0.45*Math.sin(G.t*0.6)) : (0.35+0.35*f);
    ctx.strokeStyle = full ? UI.amberHi : UI.amber;
    ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = full?10:Math.round(5*f);
    ctx.lineWidth = full?2:1;
    ctx.beginPath(); ctx.arc(cx, cy, 17-f*9, 0, 6.283); ctx.stroke();
    ctx.restore();
  }
  // cleaner drones — orbit the player, lime dots with a faint intake ring
  if(G.cleanDrones){
    const dcap=droneCap();
    for(const dr of G.cleanDrones){
      const x=sx(dr.x)|0, y=sy(dr.y)|0, full=(dr.cargo||0)>=dcap;
      if(!full){   // intake ring shown while this drone still has room
        ctx.save(); ctx.globalAlpha=0.18; ctx.strokeStyle='#a3e635';
        ctx.beginPath(); ctx.arc(x,y,DRONE_RANGE,0,6.283); ctx.stroke(); ctx.restore();
      }
      ctx.save(); ctx.shadowColor='#a3e635'; ctx.shadowBlur=4;
      blit(SPR.cleaner, x, y); ctx.restore();
      if(full) px(x, y-4, 1, 1, '#fbbf24');   // amber "full" pip above when its buffer is maxed
    }
  }
  // shield drones — orbit the player, cyan dots with glow
  if(G.shields){
    const n=G.shields.length;
    for(let i=0;i<n;i++){
      const ang = G.shieldPhase + (i/n)*Math.PI*2;
      const sxw = G.px + Math.cos(ang)*SHIELD_R;
      const syw = G.py + Math.sin(ang)*SHIELD_R;
      ctx.save(); ctx.shadowColor='#5eead4'; ctx.shadowBlur=4;
      drawDisc(sx(sxw)|0, sy(syw)|0, 2, '#a7ffd0');
      ctx.restore();
      px(sx(sxw)|0, sy(syw)|0, 1, 1, '#ffffff');
    }
  }

  // ---- MINIMAP: top-right, shows the whole world in miniature ----
  (function(){
    const MW=46, MH=62;                  // map size (kept narrow + tall = world ratio)
    const MX=LW-MW-3, MY=18;             // sit just under the top status bar
    // background panel — semi-transparent so enemies behind the map remain visible
    ctx.save(); ctx.globalAlpha=0.55;
    px(MX-1,MY-1,MW+2,MH+2,UI.amberDark);
    px(MX,MY,MW,MH,UI.bg0);
    ctx.restore();
    // bracket corners
    for(const cn of [[MX,MY,1,1],[MX+MW-1,MY,-1,1],[MX,MY+MH-1,1,-1],[MX+MW-1,MY+MH-1,-1,-1]]){
      px(cn[0],cn[1],3*cn[2]||3,1,UI.amber); px(cn[0],cn[1],1,3*cn[3]||3,UI.amber);
    }
    // world->map projection helpers
    const sx_ = wx => MX + (wx/WW)*MW;
    const sy_ = wy => MY + (wy/WH)*MH;
    // safe zone — soft green ring around base
    const bx=sx_(STATION.x), by=sy_(STATION.y);
    const safePx = (SAFE_R/WW)*MW;
    ctx.save(); ctx.globalAlpha=0.5; ctx.strokeStyle=UI.green; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(bx,by,safePx,0,6.283); ctx.stroke();
    ctx.restore();
    // junk — bright amber pinpricks (1×1, sharp). The "lootable" reading: bright = pick this up.
    if(G.junk.length){
      ctx.save(); ctx.globalAlpha=0.75;
      for(let i=0;i<G.junk.length;i++){
        const j=G.junk[i]; px(sx_(j.x)|0, sy_(j.y)|0, 1, 1, UI.amberHi);
      }
      ctx.restore();
    }
    // obstacles — 2×2 themed pastel blocks. Bigger + duller than junk so they read
    // unmistakably as "do-not-touch" geometry rather than collectibles.
    {
      const _theme = (stageCfg(G.stage||1) || {}).theme;
      const obsCol = _theme ? lerpHex(_theme.accent, '#000000', 0.45) : UI.textDim;
      for(const o of G.obstacles){
        px((sx_(o.x)-1)|0, (sy_(o.y)-1)|0, 2, 2, obsCol);
      }
    }
    // mobs — purple dots
    for(const mo of G.mobs){
      if(mo.dead) continue;
      const k=MOB_KIND[mo.kind]||MOB_KIND.base;
      px(sx_(mo.x)-1|0, sy_(mo.y)-1|0, 2, 2, k.glow);
    }
    // CRATES — bright pulsing gold dot + expanding ring so it's actually noticed
    for(const cr of G.crates){
      if(cr.opened) continue;
      const cx_=sx_(cr.x), cy_=sy_(cr.y);
      // expanding ring: 0..6px radius, fades alpha as it grows (1Hz-ish pulse)
      const ringR = (G.t % 30) / 30 * 6;
      const ringA = 1 - (G.t % 30) / 30;
      ctx.save();
      ctx.strokeStyle = '#fde047'; ctx.globalAlpha = ringA * 0.8; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(cx_, cy_, ringR, 0, 6.283); ctx.stroke();
      ctx.restore();
      // core dot with glow — bigger than before
      ctx.save(); ctx.shadowColor='#fde047'; ctx.shadowBlur=6;
      const s = (G.t>>2)&1 ? 4 : 3;
      px(cx_-(s>>1)|0, cy_-(s>>1)|0, s, s, '#fde047');
      ctx.restore();
    }
    // base — amber dot, pulses slightly so it's findable
    ctx.save(); ctx.shadowColor=UI.amber; ctx.shadowBlur=4;
    px(bx-1|0, by-1|0, 2, 2, UI.amberHi);
    ctx.restore();
    // boss — gray dot before found, red flashing dot once awake
    if(G.boss && !G.boss.dead){
      const bbx=sx_(G.boss.x), bby=sy_(G.boss.y);
      if(G.bossFound){
        if((G.t>>2)&1){ ctx.save(); ctx.shadowColor=UI.red; ctx.shadowBlur=4;
          px(bbx-1|0, bby-1|0, 3, 3, UI.red); ctx.restore(); }
        else px(bbx-1|0, bby-1|0, 2, 2, UI.red);
      } else {
        // pre-discovery: faint dim marker
        px(bbx|0, bby|0, 1, 1, UI.amberDim);
      }
    }
    // player — cyan dot, blinks
    if((G.t>>2)&1 || G.state!=='play'){
      const ppx=sx_(G.px), ppy=sy_(G.py);
      ctx.save(); ctx.shadowColor=UI.amberHi; ctx.shadowBlur=4;
      px(ppx-1|0, ppy-1|0, 2, 2, UI.amberHi);
      ctx.restore();
    }
    // camera viewport rectangle (where the player can see right now)
    ctx.save(); ctx.globalAlpha=0.35; ctx.strokeStyle=UI.amberDim; ctx.lineWidth=1;
    const vx=sx_(G.camX), vy=sy_(G.camY), vw=(LW/WW)*MW, vh=(LH/WH)*MH;
    ctx.strokeRect(vx, vy, vw, vh);
    ctx.restore();
    // label
    text('MAP', MX, MY+MH+1, UI.amberDim, 1);
  })();

  // ---- radar arrows pointing to STATION (HOME marker) and BOSS (alarm marker) ----
  // Differentiated by SHAPE, not just color: home = square house silhouette with
  // a pointed roof; boss = pulsing red ring + dot. Far harder to confuse at a glance.
  (function(){
    function edgePos(tx,ty){
      const dx=tx-G.px, dy=ty-G.py, a=Math.atan2(dy,dx);
      const ex=LW/2+Math.cos(a)*(LW/2-14), ey=LH/2+Math.sin(a)*(LH/2-18);
      return {ex, ey, a};
    }
    // HOME marker — solid amber square with a tiny roof chevron pointing back toward base
    if(!onScreen(STATION.x, STATION.y, 10)){
      const p = edgePos(STATION.x, STATION.y);
      ctx.save(); ctx.globalAlpha=0.95;
      ctx.shadowColor=UI.amber; ctx.shadowBlur=3;
      // house body
      px((p.ex-3)|0, (p.ey-2)|0, 6, 5, UI.amber);
      // small darker window
      px((p.ex-1)|0, (p.ey)|0, 2, 2, UI.amberDark);
      // roof chevron pointing toward STATION
      const rx = p.ex + Math.cos(p.a)*4, ry = p.ey + Math.sin(p.a)*4;
      px((rx-1)|0, (ry-1)|0, 2, 2, UI.amberHi);
      ctx.restore();
    }
    // BOSS marker — pulsing red ring + center dot, distinctly round and alarming
    if(G.boss && !G.boss.dead && !onScreen(G.boss.x, G.boss.y, 10)){
      const p = edgePos(G.boss.x, G.boss.y);
      const found = G.bossFound;
      const col = found ? UI.red : UI.amberDim;
      const pulse = found ? (0.5 + 0.5*Math.sin(G.t*0.2)) : 0.4;
      ctx.save();
      // outer pulsing ring (drawn as stroked circle, varying alpha)
      ctx.globalAlpha = 0.4 + 0.5*pulse;
      ctx.strokeStyle = col; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(p.ex, p.ey, 5 + pulse*2, 0, 6.283); ctx.stroke();
      // bright center dot
      ctx.globalAlpha = 0.95;
      ctx.shadowColor = col; ctx.shadowBlur = 4;
      px((p.ex-1)|0, (p.ey-1)|0, 3, 3, col);
      // tiny chevron pointing toward boss (just outside the ring)
      const rx = p.ex + Math.cos(p.a)*7, ry = p.ey + Math.sin(p.a)*7;
      px((rx-1)|0, (ry-1)|0, 2, 2, col);
      ctx.restore();
    }
  })();

  // ---- HUD: ship's internal console panels (amber CRT) ----
  // top status bar
  ctx.save();
  ctx.fillStyle=UI.bg1; ctx.fillRect(0,0,LW,14);
  ctx.fillStyle=UI.amberDark; ctx.fillRect(0,14,LW,1);
  ctx.restore();
  // MISS flash — pops in the bottom-right when a shot's compressed junk re-breaks
  if(G.missFlash>0){
    const a = Math.min(1, G.missFlash/12);
    ctx.save(); ctx.globalAlpha = a;
    ctx.shadowColor='#ef4444'; ctx.shadowBlur=6;
    text('MISS', LW-28, LH-36, '#ef4444', 1);
    ctx.restore();
  }
  // HEAL flash — quick green pulse across the HP bar zone when crate restores HP
  if(G.healFlash>0){
    const a = Math.min(1, G.healFlash/30);
    ctx.save(); ctx.globalAlpha = a*0.5;
    ctx.fillStyle = '#22ff88'; ctx.fillRect(0, 0, LW, 14);
    ctx.restore();
  }
  // top status bar — chained via measureText so labels never overlap values.
  // layout: HULL [♥♥♥]  AMMO 00  CLEAN 00%               AREA-N (right-aligned)
  const HUD_Y = 4, HUD_GAP = 5;
  const pct = cleanPercent();
  const pctCol = pct>=80?UI.green : pct>=40?UI.amber : UI.red;
  const ammoStr = String(G.ammo).padStart(2,'0');
  const pctStr  = String(pct).padStart(2,'0')+'%';
  const areaStr = 'AREA-'+G.stage;
  // HULL + hp boxes (1..5 depending on G.hpMax). Slightly smaller hearts +
  // tighter stride than the 3-heart version so 5 still fits on a 200px HUD.
  text('HULL', 4, HUD_Y, UI.amberDim, 1);
  let cx = rightOf('HULL', 4, 1, 4);
  const hpMax = G.hpMax || 3;
  for(let i=0;i<hpMax;i++){
    const hx = cx + i*5;
    if(i<G.hp){ ctx.save(); ctx.shadowColor=UI.red; ctx.shadowBlur=4; px(hx,HUD_Y,4,5,UI.red); ctx.restore(); }
    else px(hx,HUD_Y,4,5,UI.redDim);
  }
  cx += hpMax*5 + HUD_GAP;
  // AMMO value
  text('AMMO', cx, HUD_Y, UI.amberDim, 1);
  cx = rightOf('AMMO', cx, 1, 3);
  text(ammoStr, cx, HUD_Y, G.ammo>0?UI.green:UI.amberDark, 1);
  cx = rightOf(ammoStr, cx, 1, HUD_GAP);
  // CLEAN value
  text('CLEAN', cx, HUD_Y, UI.amberDim, 1);
  cx = rightOf('CLEAN', cx, 1, 3);
  text(pctStr, cx, HUD_Y, pctCol, 1);
  // AREA right-aligned
  text(areaStr, rightAlign(areaStr, LW-4, 1), HUD_Y, UI.amberDim, 1);

  // CARGO gauge — vertical telemetry bar with bracket frame.
  // Bar is scaled to TOTAL capacity (ship + cleaner drones); the ship's own fill
  // sits at the bottom, the drones' buffered overflow stacks above it in lime.
  const gx=6, gy=22, gw=8, gh=LH-114, CAP=cargoCap();
  const dTot=droneCargoTotal(), dCapTot=droneCapTotal(), totCap=CAP+dCapTot, totCargo=G.cargo+dTot;
  // frame brackets (not full rectangle)
  px(gx-2,gy-2,3,1,UI.amber); px(gx-2,gy-2,1,3,UI.amber);
  px(gx+gw-1,gy-2,3,1,UI.amber); px(gx+gw+1,gy-2,1,3,UI.amber);
  px(gx-2,gy+gh,3,1,UI.amber); px(gx-2,gy+gh-2,1,3,UI.amber);
  px(gx+gw-1,gy+gh,3,1,UI.amber); px(gx+gw+1,gy+gh-2,1,3,UI.amber);
  // bg
  px(gx,gy,gw,gh,UI.bg1);
  // ship fill (bottom)
  const shipFull=G.cargo>=CAP-1;
  const shipH=Math.round(gh*G.cargo/totCap);
  const cargoCol = shipFull?UI.red : G.cargo/CAP>0.7?UI.amber : UI.green;
  ctx.save(); ctx.shadowColor=cargoCol; ctx.shadowBlur=shipFull?8:4;
  px(gx, gy+gh-shipH, gw, shipH, cargoCol); ctx.restore();
  // drone buffer (lime) stacked above the ship fill
  if(dTot>0){
    const droneH=Math.max(1,Math.round(gh*dTot/totCap));
    ctx.save(); ctx.shadowColor='#a3e635'; ctx.shadowBlur=4;
    px(gx, gy+gh-shipH-droneH, gw, droneH, '#a3e635'); ctx.restore();
  }
  // divider tick at the ship-tank boundary so the two tanks read distinctly
  if(dCapTot>0){ px(gx-1, gy+gh-Math.round(gh*CAP/totCap), gw+2, 1, UI.amberHi); }
  // tick marks
  for(let k=1;k<5;k++){ px(gx-1,gy+Math.round(gh*k/5),gw+2,1,UI.bg0); }
  // label — total % across ship + drones
  const totFull=totCargo>=totCap-1;
  text('CARGO', gx-3, gy+gh+4, UI.amberDim, 1);
  text(String(Math.floor(100*totCargo/totCap)).padStart(3,'0'), gx-2, gy+gh+13, totFull?UI.red:UI.amberDim, 1);

  // power-up status panel (bottom-left). 5 stat rows + TUNE label + LOAD bar.
  // tighter 7px stride so we still fit above the FIRE button.
  const puY = LH-65;
  text('TUNE', 4, puY, UI.amberDim, 1);
  const puList = [
    ['SUC', G.pu.suck,   5, UI.amber],
    ['CAP', G.pu.tank,   5, UI.green],
    ['PWR', G.pu.power,  5, UI.red],
    ['HUL', G.pu.hull,   2, '#fb7185'],
    ['SHD', G.pu.shield, 3, '#5eead4'],
    ['DRN', G.pu.drone,  2, '#a3e635'],
  ];
  for(let i=0;i<puList.length;i++){
    const py = puY + 10 + i*7;
    text(puList[i][0], 4, py, UI.amberDark, 1);
    const max = puList[i][2], val = puList[i][1], col = puList[i][3];
    for(let s=0;s<max;s++){ px(22+s*4, py+2, 3, 3, s<val ? col : UI.amberDark); }
  }
  // progress meter (one row below the last stat row)
  const pw=46, pf=Math.round(pw*G.puProgress/puNeedNow());
  const loadY = puY + 10 + puList.length*7 + 2;
  text('LOAD', 4, loadY, UI.amberDim, 1);
  px(22, loadY, pw, 4, UI.bg1);
  ctx.save(); ctx.shadowColor=UI.green; ctx.shadowBlur=4;
  px(22, loadY, pf, 4, UI.green); ctx.restore();
  // power-up gained banner
  if(G.puFlash>0){
    ctx.save(); ctx.globalAlpha=Math.min(1,G.puFlash/20);
    px(0,LH/2-18,LW,28,'rgba(26,18,8,0.9)');
    glowCenter('[ UPGRADE INSTALLED ]', LH/2-14, UI.amber, 1, 10);
    center('> '+G.puName, LH/2-2, UI.green, 1);
    ctx.restore();
  }
  // crate banner — spawn alert (long, top) or reward toast (short, center)
  if(G.crateMsgT>0){
    if(G.crateMsgKind === 'spawn'){
      // top-positioned alert that holds steady, fades in/out
      const a = G.crateMsgT > 90 ? (120-G.crateMsgT)/30 : Math.min(1, G.crateMsgT/30);
      ctx.save(); ctx.globalAlpha = a;
      const by = 28;
      // dim backdrop strip so text reads on any background
      ctx.fillStyle = 'rgba(8,16,12,0.7)';
      ctx.fillRect(0, by-8, LW, 22);
      glowCenter('[ SUPPLY CRATE ]', by-2, '#fde047', 1, 6);
      glowCenter(G.crateMsg, by+9, '#fbbf24', 1, 6);
      ctx.restore();
    } else {
      // reward banner — bold and centered, fades in fast then drifts out.
      // colored by reward type so it reads at a glance even from peripheral vision.
      const msg = G.crateMsg || '';
      const isHull   = msg.indexOf('HULL') >= 0;
      const isShield = msg.indexOf('SHIELD') >= 0;
      const accent = isHull ? '#22ff88' : isShield ? '#5eead4' : '#fde047';
      const icon   = isHull ? '+'      : isShield ? 'O'        : '*';
      const phase = 1 - G.crateMsgT/100;     // 0 at start → 1 at end
      const a = Math.min(1, G.crateMsgT/20);
      const cy = LH/2 - 8 - phase*16;        // floats up while it's on screen
      ctx.save(); ctx.globalAlpha = a;
      // dim full-width strip so it pops on busy backgrounds
      ctx.fillStyle = 'rgba(8,16,12,0.78)';
      ctx.fillRect(0, cy-8, LW, 36);
      ctx.strokeStyle = accent; ctx.globalAlpha = a*0.7;
      ctx.strokeRect(0, cy-8, LW, 36);
      ctx.globalAlpha = a;
      glowCenter('[ '+icon+' SUPPLY CRATE '+icon+' ]', cy-2, accent, 1, 6);
      // reward text at 2x scale so it's unmistakable
      glowCenter(msg, cy+10, accent, 2, 10);
      ctx.restore();
    }
  }
  // BOSS REVEAL BANNER — full-width dramatic reveal when the boss wakes
  if(G.bossIntro>0 && G.boss){
    const t = G.bossIntro, p = t/80;
    // dim the world
    ctx.save(); ctx.globalAlpha = Math.min(0.65, p*0.7);
    ctx.fillStyle = '#1a0408'; ctx.fillRect(0, 0, LW, LH); ctx.restore();
    // top + bottom black strips slide in from outside (cinematic letterbox)
    const stripH = 28 * Math.min(1, (1-p)*3);
    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillRect(0, 0, LW, stripH);
    ctx.fillRect(0, LH-stripH, LW, stripH);
    // red accent lines on the strips
    ctx.fillStyle = UI.red;
    ctx.fillRect(0, stripH-1, LW, 1);
    ctx.fillRect(0, LH-stripH, LW, 1);
    // big "WARNING" + boss name in center
    if(p < 0.78){
      const jx = (G.t&3)===0 ? (Math.random()*2-1) : 0;
      ctx.save(); ctx.shadowColor = UI.red; ctx.shadowBlur = 14;
      glowCenter('!! WARNING !!', LH/2 - 22 + jx, UI.red, 1, 12);
      ctx.restore();
      // boss name appears slightly delayed (typewriter-ish: scale by reveal amount)
      const nameReveal = Math.min(1, (1-p)*3);
      const nameStr = (G.boss.name||'BOSS').slice(0, Math.ceil((G.boss.name||'BOSS').length * nameReveal));
      glowCenter(nameStr, LH/2 - 8, UI.amberHi, 2, 14);
      // JP reading subtitle, fades in just after the english name finishes typing
      if(nameReveal>=1 && G.boss.nameJp){
        glowCenter(G.boss.nameJp, LH/2 + 10, UI.amber, 1, 6);
      }
      if(nameReveal>=1) glowCenter('▽ HOSTILE DETECTED ▽', LH/2 + 26, UI.amber, 1, 6);
    }
  } else if(G.bossFound && G.boss && G.boss.awake && !G.boss.dead && G.boss.t<60 && (G.t>>2&1)){
    // post-intro lingering threat tag
    px(0,28,LW,12,'rgba(60,8,8,0.7)');
    glowCenter('!! THREAT DETECTED !!', 30, UI.red, 1, 10);
  }
  // mission status: boss down — return to base
  if(G.bossDowned && G.state==='play' && (G.t>>4&1)){
    px(0,28,LW,12,'rgba(60,40,8,0.7)');
    glowCenter('> RETURN TO BASE', 30, UI.amber, 1, 8);
  }
  // STAGE START banner — animated reveal, holds until the player taps to dismiss
  if(G.state==='play' && G.showStageBanner){
    const cfg=stageCfg(G.stage);
    // dim the world behind
    px(0,0,LW,LH,'rgba(0,0,0,0.6)');
    // banner box — slides in from collapsed (h=0) to full height in 14 frames
    const grow = Math.min(1, G.t/14);
    const fullH = 96;
    const h = (fullH*grow)|0;
    const by = LH/2 - h/2;
    if(h>2){
      px(0,by,LW,h,'rgba(12,16,12,0.94)');
      // top & bottom amber lines + bracket corners
      px(0,by,LW,1,UI.amber); px(0,by+h-1,LW,1,UI.amber);
      for(const cn of [[6,by+2,1,1],[LW-7,by+2,-1,1],[6,by+h-3,1,-1],[LW-7,by+h-3,-1,-1]]){
        px(cn[0],cn[1],6*cn[2]||6,1,UI.amberHi); px(cn[0],cn[1],1,4*cn[3]||4,UI.amberHi);
      }
    }
    // typewriter reveal: each line appears in sequence
    if(grow>=1){
      const tt = G.t - 14;     // frames since banner finished growing
      // Line 1: STAGE X / Y  — instant (NG+ loop flagged HARD MODE)
      const ngp = loopOf(G.stage)>=1;
      glowCenter('STAGE '+G.stage+' / '+TOTAL_STAGES+(ngp?'  ［HARD］':''), by+10, ngp?UI.red:UI.amberDim, 1, 4);
      // Line 2: area name — typewriter
      const name = cfg.name;
      if(tt>=4){
        const rev = Math.min(name.length, Math.floor((tt-4)*0.7));
        glowCenter(name.slice(0,rev)+(rev<name.length && (G.t>>1&1)?'_':''), by+28, UI.amberHi, 1, 8);
      }
      // Line 3: boss preview — typewriter after name finishes
      const nameDone = 4 + name.length/0.7;
      if(tt>=nameDone){
        const bn = bossNameFor(cfg, G.loop)||'BOSS';
        const bossStr = '▽ '+bn+' awaits';
        const rev = Math.min(bossStr.length, Math.floor((tt-nameDone)*0.7));
        center(bossStr.slice(0,rev), by+50, UI.red, 1);
      }
      // Line 4: tap prompt — blinking, appears last
      const bossDone = nameDone + (cfg.bossName||'BOSS').length/0.7 + 12;
      if(tt>=bossDone && ((G.t>>4)&1)){
        glowCenter('> TAP TO START', by+72, UI.green, 1, 6);
      }
    }
  }

  // ぷにコン virtual stick — base ring at the touch origin + knob at the tilt.
  // anchor/pointer are already in screen space, so draw directly (no sx/sy).
  if(pointerIsTouch && pointer && anchor && G.state==='play' && !G.showStageBanner){
    const STICK_MAX=34;
    let dx=pointer.x-anchor.fx, dy=pointer.y-anchor.fy, dist=Math.hypot(dx,dy)||1;
    const kr=Math.min(dist,STICK_MAX);
    const kx=(anchor.fx+dx/dist*kr)|0, ky=(anchor.fy+dy/dist*kr)|0;
    ctx.save();
    // base ring
    ctx.globalAlpha=0.22; ctx.strokeStyle='#5eead4'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(anchor.fx, anchor.fy, STICK_MAX, 0, 6.283); ctx.stroke();
    // dead-zone centre pip
    ctx.globalAlpha=0.35; px((anchor.fx-1)|0,(anchor.fy-1)|0,2,2,'#5eead4');
    // knob
    ctx.globalAlpha=0.85; ctx.shadowColor='#fbbf24'; ctx.shadowBlur=6;
    drawDisc(kx,ky,5,'#fbbf24'); drawDisc(kx,ky,3,'#fde047');
    ctx.restore();
  }

  // fire button — physical-looking amber arcade button
  (function(){
    const b=FIRE_BTN, s=b.r;
    const inSafe = Math.hypot(G.px-STATION.x, G.py-STATION.y) < SAFE_R;
    const ready = G.ammo>=1 && !inSafe;
    const near=Math.abs(G.px-b.x)<s+8 && Math.abs(G.py-b.y)<s+8;
    ctx.save(); ctx.globalAlpha=near?0.35:1;
    drawDisc(b.x,b.y, s+1, UI.bezel);
    drawDisc(b.x,b.y, s,   UI.bg0);
    drawDisc(b.x,b.y, s-2, ready?UI.amberDark:'#1c1408');
    ctx.shadowColor=ready?UI.amber:'transparent'; ctx.shadowBlur=ready?12:0;
    ctx.strokeStyle=ready?UI.amber:UI.amberDark; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(b.x,b.y,s-3,0,6.283); ctx.stroke();
    ctx.shadowBlur=ready?8:0;
    drawDisc(b.x,b.y, ready?4:3, ready?UI.amberHi:UI.amberDim);
    ctx.shadowBlur=0;
    if(inSafe && G.ammo>=1){
      text('SAFE', b.x-9, b.y+s-4, UI.greenDim, 1);
    } else {
      text('FIRE', b.x-9, b.y+s-4, ready?UI.amberHi:UI.amberDark, 1);
    }
    ctx.restore();
  })();

  drawBudget(26, LH-9);

  if(G.state==='pick' && G.puCards){
    // backdrop & frame
    px(0,0,LW,LH,'rgba(12,10,6,0.92)');
    // header strip
    px(0,28,LW,1,UI.amberDark);
    px(0,64,LW,1,UI.amberDark);
    text('> SYS', 8, 32, UI.amberDim, 1);
    text('UPGRADE_AVAILABLE', rightOf('> SYS', 8, 1, 4), 32, UI.green, 1);
    fitCenter('SELECT UPGRADE', 46, UI.amber, 2, LW-12, 12);
    if(G.puPicks>1){
      const q = 'QUEUE: '+G.puPicks;
      text(q, rightAlign(q, LW-8, 1), 32, UI.amber, 1);
    }
    const lv = G.pu;   // covers all PU keys including hull, shield
    for(let i=0;i<G.puCards.length;i++){
      const d=G.puCards[i], r=cardRect(i);
      const hot=(G.t>>3&1);
      // card background — dark panel with bracketed corners
      px(r.x,r.y,r.w,r.h,UI.bg1);
      // bracket corners
      for(const cn of [[r.x,r.y,1,1],[r.x+r.w-1,r.y,-1,1],[r.x,r.y+r.h-1,1,-1],[r.x+r.w-1,r.y+r.h-1,-1,-1]]){
        const col = hot?d.col:UI.amberDark;
        px(cn[0],cn[1],4*cn[2]||4,1,col); px(cn[0],cn[1],1,4*cn[3]||4,col);
      }
      // colored side bar + glowing icon swatch
      px(r.x,r.y,3,r.h,d.col);
      ctx.save(); ctx.shadowColor=d.col; ctx.shadowBlur=hot?8:3;
      px(r.x+9,r.y+9,16,16,d.col); ctx.restore();
      px(r.x+13,r.y+13,8,8,UI.bg0);
      // texts — number + name on top, description below, Lv right-aligned to card edge
      text((i+1)+'.', r.x+30, r.y+5, d.col, 1);
      const lvStr = 'Lv'+lv[d.k]+'→'+(lv[d.k]+1)+'/'+PU_MAX[d.k];
      const lvX = rightAlign(lvStr, r.x+r.w-4, 1);
      // truncate name with ellipsis if it would collide with the Lv text
      const nameX = rightOf((i+1)+'.', r.x+30, 1, 4);
      let nameStr = d.name;
      ctx.font = fontFor(nameStr, 1);
      while(ctx.measureText(nameStr).width > lvX - nameX - 4 && nameStr.length>3){
        nameStr = nameStr.slice(0,-1);
      }
      if(nameStr !== d.name) nameStr = nameStr.slice(0,-1) + '…';
      text(nameStr, nameX, r.y+5, UI.text, 1);
      text('> '+d.desc, r.x+30, r.y+18, UI.amberDim, 1);
      text(lvStr, lvX, r.y+5, d.col, 1);
    }
    center('> TAP TO SELECT', CARD.top+G.puCards.length*(CARD.h+CARD.gap)+6, UI.amberDim, 1);
  }
  if(G.state==='postBoss'){
    px(0,0,LW,LH,'rgba(12,10,6,0.94)');
    // header
    px(0,28,LW,1,UI.amberDark);
    px(0,72,LW,1,UI.amberDark);
    text('> ALERT', 8, 32, UI.red, 1);
    text('THREAT_NEUTRALIZED', rightOf('> ALERT', 8, 1, 4), 32, UI.green, 1);
    glowCenter('BOSS DOWN', 46, UI.amberHi, 2, 14);
    // boss name (the defeated one)
    const sc = stageCfg(G.stage);
    center('▼ '+(bossNameFor(sc, G.loop)||'BOSS')+' ▼', 64, UI.red, 1);
    // status info
    const cpct = cleanPercent();
    text('AREA: '+(G.loop>=1?'NG+ ':'')+sc.name, 30, 88, UI.amberDim, 1);
    text('CLEAN: '+cpct+'%', 30, 100, UI.green, 1);
    text('STAGE: '+G.stage+'/'+TOTAL_STAGES, 30, 112, UI.amberDim, 1);
    // two big console buttons
    const r0=pbRect(0), r1=pbRect(1), hot=(G.t>>3&1);
    // option 1: keep cleaning (green = ongoing op)
    px(r0.x,r0.y,r0.w,r0.h,UI.bg1);
    for(const cn of [[r0.x,r0.y,1,1],[r0.x+r0.w-1,r0.y,-1,1],[r0.x,r0.y+r0.h-1,1,-1],[r0.x+r0.w-1,r0.y+r0.h-1,-1,-1]]){
      const col = hot?UI.green:UI.greenDim;
      px(cn[0],cn[1],5*cn[2]||5,1,col); px(cn[0],cn[1],1,5*cn[3]||5,col);
    }
    px(r0.x,r0.y,3,r0.h,UI.green);
    glowText('[1] CONTINUE', r0.x+12, r0.y+10, UI.green, 1, hot?6:3);
    text('> 残りを掃除', r0.x+12, r0.y+26, UI.amberDim, 1);
    // option 2: next stage (amber = advance)
    px(r1.x,r1.y,r1.w,r1.h,UI.bg1);
    for(const cn of [[r1.x,r1.y,1,1],[r1.x+r1.w-1,r1.y,-1,1],[r1.x,r1.y+r1.h-1,1,-1],[r1.x+r1.w-1,r1.y+r1.h-1,-1,-1]]){
      const col = hot?UI.amber:UI.amberDim;
      px(cn[0],cn[1],5*cn[2]||5,1,col); px(cn[0],cn[1],1,5*cn[3]||5,col);
    }
    px(r1.x,r1.y,3,r1.h,UI.amber);
    const isFinal = G.stage >= TOTAL_STAGES;
    const nextStage = G.stage + 1;
    const nextCfg = !isFinal ? stageCfg(nextStage) : null;
    const intoNGplus = !isFinal && loopOf(nextStage) >= 1 && loopOf(G.stage) === 0;  // crossing 5 → 6
    const nextLabel = isFinal ? '> 帰還 / 任務完了'
                    : intoNGplus ? '> 2周目 — ハードモード突入'
                    : ('> '+(loopOf(nextStage)>=1?'NG+ ':'')+(nextCfg?nextCfg.name:''));
    glowText(isFinal?'[2] RETURN':(intoNGplus?'[2] NG+':'[2] WARP'), r1.x+12, r1.y+10, intoNGplus?UI.red:UI.amber, 1, hot?6:3);
    text(nextLabel, r1.x+12, r1.y+26, UI.amberDim, 1);
    center('> TAP TO SELECT', PB_BTN.top+2*(PB_BTN.h+PB_BTN.gap)+10, UI.amberDim, 1);
  }
  if(G.state==='clear'){
    px(0,0,LW,LH,'rgba(12,10,6,0.92)');
    // 🎉 confetti rain — celebratory, falls continuously behind the panel
    {
      const CC=['#fde047','#22ff88','#5eead4','#ff6b8e','#fbbf24','#a78bfa','#ffffff'];
      ctx.save();
      for(let i=0;i<48;i++){
        const seed=i*129+7;
        const cx=(seed*1.7)%LW;
        const fall=(G.t*1.7 + (seed%97)*1.3);
        const cy=((fall + seed) % (LH+24)) - 12;
        const sway=Math.sin((G.t*0.06)+seed)*6;
        const col=CC[i%CC.length];
        ctx.globalAlpha=0.85;
        const w=(i%3)?3:2, h=(i%2)?3:5;
        px((cx+sway)|0, cy|0, w, h, col);
      }
      ctx.restore();
    }
    // header
    px(0,28,LW,1,UI.amberDark);
    text('> SYS', 8, 32, UI.amberDim, 1);
    text('FINAL_LOG', rightOf('> SYS', 8, 1, 4), 32, UI.green, 1);
    // big celebratory burst pulses out from the title on entry
    if(G.t < 40){
      ctx.save();
      const pr=(G.t/40);
      ctx.globalAlpha=(1-pr)*0.5; ctx.strokeStyle=UI.amberHi; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(LW/2, 60, 20+pr*120, 0, 6.283); ctx.stroke();
      ctx.restore();
    }
    fitCenter('ALL CLEAR', 52, UI.amberHi, 2, LW-12, 14);
    center('★ 2周目制覇 — 完全クリア ★', 86, UI.amber, 1);
    px(0,102,LW,1,UI.amberDark);
    // total cleanup across all 5 stages (carried + current)
    const totMass = (G.totalMass||0) + G.junkMass;
    const totColl = (G.totalCollected||0) + G.collectedMass;
    const cpct = totMass>0 ? Math.floor(100*totColl/totMass) : 0;
    const rank = cpct>=95?'S': cpct>=80?'A': cpct>=60?'B':'C';
    const label={S:'銀河ピカピカ清掃員',A:'ベテラン清掃員',B:'見習い清掃員',C:'まだ散らかってます'}[rank];
    const lx=40;
    text('STAGES......', lx, 120, UI.amberDim, 1);
    text(G.stage+'/'+TOTAL_STAGES, lx+90, 120, UI.amber, 1);
    text('TOTAL CLEAN..', lx, 134, UI.amberDim, 1);
    glowText(String(cpct).padStart(3,'0')+'%', lx+90, 134, UI.amber, 1, 4);
    text('HAULS........', lx, 148, UI.amberDim, 1);
    text(String(G.unloaded).padStart(3,'0'), lx+90, 148, UI.amber, 1);
    px(0,170,LW,1,UI.amberDark);
    // RANK seal — letter stamps in at t=24 with a flash + scale
    glowCenter('=== RANK ===', 180, UI.amberDim, 1, 4);
    if(G.t >= 24){
      const stampT = G.t - 24;
      // first 6 frames: large scale "stamping" down + white flash
      const stampScale = stampT < 6 ? (4 + (6-stampT)*0.6) : 4;
      const stampCol = stampT < 4 ? '#ffffff' : UI.amberHi;
      ctx.save(); ctx.shadowColor = stampCol; ctx.shadowBlur = stampT < 8 ? 26 : 18;
      glowCenter(rank, 196, stampCol, stampScale, stampT < 8 ? 26 : 18);
      ctx.restore();
    }
    if(G.t >= 40) center(label, 244, UI.text, 1);
    if(G.t>56 && ((G.t>>4)&1)) glowCenter('> RETURN TO TITLE', 274, UI.green, 1, 6);
  }
  if(G.state==='over'){
    // initial red impact flash (decays over first ~15 frames)
    const impact = Math.max(0, 1 - G.t/15);
    ctx.save(); ctx.globalAlpha = 0.4 + impact*0.4;
    ctx.fillStyle = '#2a0408'; ctx.fillRect(0,0,LW,LH); ctx.restore();
    if(impact>0){ ctx.save(); ctx.globalAlpha=impact*0.4; ctx.fillStyle='#ef4444'; ctx.fillRect(0,0,LW,LH); ctx.restore(); }
    px(0,28,LW,1,UI.redDim);
    text('> ERROR', 8, 32, UI.red, 1);
    text('CRAFT_DESTROYED', rightOf('> ERROR', 8, 1, 4), 32, UI.red, 1);
    // SYSTEM FAILURE — glitch jitter every few frames, auto-fit so it doesn't clip
    const jx = (G.t&3)===0 ? (Math.random()*3-1.5) : 0;
    fitCenter('SYSTEM FAILURE', (60+jx)|0, UI.red, 2, LW-12, 14);
    // a brighter scanline sweeps downward (recurring)
    const sweepY = (G.t*3)%LH;
    ctx.save(); ctx.globalAlpha=0.18; ctx.fillStyle='#ff8080'; ctx.fillRect(0, sweepY, LW, 2); ctx.restore();
    center('> ロボ大破', 96, UI.text, 1);
    px(0,116,LW,1,UI.redDim);
    const cpct = cleanPercent();
    const lx=40;
    // stats appear with stagger
    if(G.t>=20){ text('FINAL CLEAN..', lx, 140, UI.amberDim, 1); text(String(cpct).padStart(3,'0')+'%', lx+90, 140, UI.red, 1); }
    if(G.t>=30){ text('COLLECTED....', lx, 154, UI.amberDim, 1); text(String(G.collected).padStart(3,'0'), lx+90, 154, UI.amberDim, 1); }
    if(G.t>40 && ((G.t>>4)&1)) glowCenter('> RETRY', 216, UI.amber, 1, 6);
  }
  // damage flash — red wash over the screen on hurt
  if(G.flashHp>0){
    ctx.save(); ctx.globalAlpha = Math.min(0.45, G.flashHp/12*0.45);
    ctx.fillStyle='#ef4444'; ctx.fillRect(0,0,LW,LH); ctx.restore();
  }
  // CRT scanlines + bezel — drawn last, over everything
  drawCRTOverlay();
}

/* ---------- loop ---------- */
// re-fit once after all UI constants (FIRE_BTN/CARD/PB_BTN) are declared,
// so applyCanvasSize can sync them to the (possibly expanded) LW
fit();
// fixed-timestep loop: simulation runs at 60Hz regardless of display refresh rate
// (so 120Hz/144Hz monitors don't double/triple game speed).
const TICK_MS = 1000/60;
const MAX_CATCHUP = 5;          // cap update steps per frame (avoid spiral-of-death on tab-resume)
let _lastT = performance.now();
let _acc = 0;
function loop(now){
  if(now == null) now = performance.now();
  let dt = now - _lastT; _lastT = now;
  if(dt > 250) dt = 250;        // clamp huge gaps (tab inactive)
  _acc += dt;
  let steps = 0;
  while(_acc >= TICK_MS && steps < MAX_CATCHUP){
    update();
    _acc -= TICK_MS;
    steps++;
  }
  if(steps >= MAX_CATCHUP) _acc = 0;  // drop residue if we hit the cap
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
