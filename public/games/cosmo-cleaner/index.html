   COSMO CLEANER  —  MVP prototype
   Core loop: SUCK trash -> fill tank -> fire COMPRESSED shot
   -> hit = purified, MISS = shot breaks back into trash.
   Zero asset files. Sprites are text grids, sound is synth.
   ============================================================ */

// LW/LH are MUTABLE — they adapt to the viewport aspect ratio so the game
// fills more of the screen on fold phones / tablets / desktop. LH is locked
// at 320 (vertical game), LW grows from 200 (portrait phone) up to 400
// (~5:4 = fold/tablet/desktop), snapped to 8-pixel increments.
let LW = 200, LH = 320;
const BASE_LW = 200, MAX_LW = 400;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = LW; cv.height = LH;
ctx.imageSmoothingEnabled = false;

// pre-baked offscreen canvases — building createRadialGradient every frame
// was a major mobile FPS hit. Bake once, then drawImage per frame.
let _aura = null, _vig = null;
function buildAura(){
  _aura = document.createElement('canvas');
  _aura.width = 240; _aura.height = 240;
  const x = _aura.getContext('2d');
  const g = x.createRadialGradient(120, 120, 2, 120, 120, 120);
  g.addColorStop(0, 'rgba(34,255,136,0.10)'); g.addColorStop(1, 'rgba(34,255,136,0)');
  x.fillStyle = g; x.fillRect(0, 0, 240, 240);
}
function buildVignette(){
  _vig = document.createElement('canvas');
  _vig.width = LW; _vig.height = LH;
  const x = _vig.getContext('2d');
  const g = x.createRadialGradient(LW/2, LH/2, LH*0.25, LW/2, LH/2, LH*0.65);
  g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.75)');
  x.fillStyle = g; x.fillRect(0, 0, LW, LH);
}
buildAura();
buildVignette();
// recompute UI constants that depend on LW / LH (called whenever LW changes).
// Wrapped in try-catch because in strict mode, `typeof` on a const-in-TDZ
// (i.e. FIRE_BTN/CARD/PB_BTN, which are declared later in the file) throws
// ReferenceError, NOT returns "undefined". The first fit() call at load time
// runs before those consts are initialised; the final fit() call at the
// bottom of the script runs after they exist and updates them correctly.
function applyCanvasSize(){
  cv.width = LW; cv.height = LH;
  ctx.imageSmoothingEnabled = false;
  buildVignette();
  try { FIRE_BTN.x = LW-22; FIRE_BTN.y = LH-24; } catch(e){}
  try { CARD.w = Math.max(150, Math.min(240, LW-40)); } catch(e){}
  try { PB_BTN.w = Math.min(160, LW-24); } catch(e){}
}

function fit(){
  // prefer visualViewport for accuracy on iOS (address bar collapses)
  const vv = window.visualViewport;
  const vw = vv ? vv.width  : window.innerWidth;
  const vh = vv ? vv.height : window.innerHeight;
  // pick internal LW based on viewport aspect ratio so wider screens see
  // more of the world horizontally (fills fold-phone / desktop nicely)
  const targetAR = vw / vh;
  const baseAR = BASE_LW / LH;   // 200/320 = 0.625
  let newLW = BASE_LW;
  if(targetAR > baseAR){
    newLW = Math.min(MAX_LW, Math.round((LH * targetAR) / 8) * 8);
  }
  if(newLW !== LW){
    LW = newLW;
    applyCanvasSize();
  }
  // pad: zero on phone-sized screens (fill it), small ring on bigger screens
  const pad = Math.min(vw, vh) < 500 ? 0 : 8;
  let s = Math.min((vw - pad)/LW, (vh - pad)/LH);
  // snap to integer when comfortably above 2x — keeps pixel art crisp on big screens
  if(s >= 2){ s = Math.floor(s); }
  cv.style.width  = (LW*s)+'px';
  cv.style.height = (LH*s)+'px';
}
window.addEventListener('resize', fit);
window.addEventListener('orientationchange', ()=>{ setTimeout(fit, 100); });
if(window.visualViewport){ window.visualViewport.addEventListener('resize', fit); }
fit();

function bake(grid){
  const h=grid.length, w=grid[0].length;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const x=c.getContext('2d');
  for(let j=0;j<h;j++) for(let i=0;i<w;i++){ const col=PAL[grid[j][i]]; if(col){ x.fillStyle=col; x.fillRect(i,j,1,1);} }
  c.cw=w; c.ch=h; return c;
}
const SPR={}; for(const k in S) SPR[k]=bake(S[k]);
function blit(spr,cx,cy){ ctx.drawImage(spr, Math.round(cx-spr.cw/2), Math.round(cy-spr.ch/2)); }
// scaled blit around centre (pixelated — imageSmoothing stays off). Visual only.
function blitScaled(spr,cx,cy,s){ const w=Math.round(spr.cw*s), h=Math.round(spr.ch*s); ctx.drawImage(spr, Math.round(cx-w/2), Math.round(cy-h/2), w, h); }

/* ---------- audio (synth) ---------- */
let AC=null;
function audio(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function blip(f,dur,type,vol,slideTo){
  if(!AC) return; const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(f,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(vol||0.1,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+dur);
}
function noise(dur,vol,cutSweep){
  if(!AC) return; const t=AC.currentTime, n=Math.floor(AC.sampleRate*dur);
  const buf=AC.createBuffer(1,n,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<n;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/n,1.5); }
  const src=AC.createBufferSource(); src.buffer=buf;
  const lp=AC.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(cutSweep?2200:900,t);
  if(cutSweep) lp.frequency.exponentialRampToValueAtTime(200,t+dur);
  const g=AC.createGain(); g.gain.setValueAtTime(vol||0.2,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  src.connect(lp).connect(g).connect(AC.destination); src.start(t);
}

  slurp(fill){ blip(110+fill*70,.05,'sawtooth',.022,210+fill*170); },

  rebreak(){ noise(.22,.22,false); blip(200,.18,'sawtooth',.1,90); }, // ugly "ugh, more trash"
  dock(){ blip(440,.06,'square',.08,660); blip(660,.1,'square',.07,880); }, // unload chime
  missile(){ blip(440,.18,'sawtooth',.1,140); noise(.12,.1,true); }, // launch warble

const STEP_DUR=0.16;
// explore: calm, floating minor-ish arpeggios (Dm - Bb - F - C)
const EXPLORE = { arp:[[294,349,440],[233,294,349],[349,440,523],[262,330,392]], bass:[73,58,87,65] };
// boss: tense, driving (Dm - Dm - Gm - A)
const BOSS_BGM = { arp:[[294,349,440],[294,349,440],[392,466,587],[330,415,554]], bass:[73,73,98,110] };
function noteAt(freq, when, dur, type, vol){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(freq, when);
  g.gain.setValueAtTime(0.0001, when); g.gain.exponentialRampToValueAtTime(vol||0.06, when+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, when+dur);
  o.connect(g).connect(AC.destination); o.start(when); o.stop(when+dur);
}
function scheduleBGM(){
  if(!bgmOn || !AC) return;
  const song = bgmMode==='boss' ? BOSS_BGM : EXPLORE;
  const tempo = bgmMode==='boss' ? STEP_DUR*0.82 : STEP_DUR; // boss is faster
  while(nextNote < AC.currentTime + 0.12){
    const bar=Math.floor(bstep/4)%4, arp=song.arp[bar];
    noteAt(arp[bstep%3], nextNote, .14, 'square', .055);
    if(bstep%4===0) noteAt(song.bass[bar], nextNote, .26, 'triangle', .1);
    if(bstep%8===4) noteAt(arp[2]*2, nextNote, .1, 'square', .03);
    if(bgmMode==='boss' && bstep%2===0) noteAt(song.bass[bar]/2, nextNote, .12, 'sawtooth', .04); // driving pulse
    nextNote += tempo; bstep++;
  }
  bgmTick=setTimeout(scheduleBGM, 30);
}
function startBGM(){ if(!AC||bgmOn) return; bgmOn=true; bstep=0; nextNote=AC.currentTime+0.08; scheduleBGM(); }
function stopBGM(){ bgmOn=false; if(bgmTick) clearTimeout(bgmTick); bgmTick=null; }
function setBGM(mode){ if(bgmMode!==mode){ bgmMode=mode; bstep=0; } }

  // so each stage's first PU costs cfg.puBase (same feel as Stage 1).

// CLEAN % shown in HUD. dirty = junk currently in world + suckable boss-spit ebullets.
// Formula: collected / (collected + dirty). Sucking ALWAYS pushes % up (numerator grows
// faster than denominator). Boss spit / mob litter temporarily lowers % by inflating
// the denominator. When the world is empty, % = 100. When spit flies off-screen the
// denominator drops back down naturally.
function cleanPercent(){
  let dirty = G.junk.length;
  for(const e of G.ebullets){ if(!e.fromMob) dirty++; }
  const total = G.collected + dirty;
  if(total <= 0) return 0;
  return Math.max(0, Math.min(100, Math.floor(100 * G.collected / total)));
}

function inRect(p,r){ return p.x>=r.x && p.x<=r.x+r.w && p.y>=r.y && p.y<=r.y+r.h; }
function ptFromClient(cx,cy){ const r=cv.getBoundingClientRect(); return {x:(cx-r.left)/r.width*LW, y:(cy-r.top)/r.height*LH}; }
function ptFrom(t){ return ptFromClient(t.clientX,t.clientY); }
function inFire(p){ return Math.abs(p.x-FIRE_BTN.x)<FIRE_BTN.r && Math.abs(p.y-FIRE_BTN.y)<FIRE_BTN.r; }
function tryPickAt(p){
  if(!G.puCards) return false;
  for(let i=0;i<G.puCards.length;i++){ if(inRect(p,cardRect(i))){ choosePick(i); return true; } }

}

function press(e){
  e.preventDefault(); audio(); if(AC.state==='suspended') AC.resume();
  if(G.state==='title'){ begin(); return; }
  if(G.state==='clear'||G.state==='over'){ if(G.t>40){ reset(); G.state='title'; } return; }
  // dismiss stage-intro banner first — single tap anywhere closes it
  if(G.showStageBanner){ G.showStageBanner=false; G.t=0; return; }
  if(G.state==='pick'){
    const p = e.touches ? ptFrom(e.changedTouches[0]) : ptFromClient(e.clientX,e.clientY);
    tryPickAt(p); return;
  }
  if(G.state==='postBoss'){
    const p = e.touches ? ptFrom(e.changedTouches[0]) : ptFromClient(e.clientX,e.clientY);
    tryPostBossAt(p); return;
  }
  if(e.touches){
    for(const t of e.changedTouches){
      const p=ptFrom(t);
      // FIRE button: start charging. Quick release = tap shot, hold = charged blast.
      if(inFire(p)){ if(fireId===null){ fireId=t.identifier; G.charging=true; G.chargeT=0; } continue; }
      if(moveId===null){ moveId=t.identifier; pointer=p; anchor={fx:p.x,fy:p.y,sx:G.px,sy:G.py}; pointerIsTouch=true; G.sucking=true; }
    }
  } else {
    const p=ptFromClient(e.clientX,e.clientY);
    if(inFire(p)){ fireMouse=true; G.charging=true; G.chargeT=0; return; }
    pointer=p; anchor={fx:p.x,fy:p.y,sx:G.px,sy:G.py}; pointerIsTouch=false; G.sucking=true;
  }
}
function move(e){
  if(e.touches){ for(const t of e.changedTouches){ if(t.identifier===moveId){ e.preventDefault(); pointer=ptFrom(t);} } }
  else if(pointer){ e.preventDefault(); pointer=ptFromClient(e.clientX,e.clientY); }
}
function endTouch(e){ for(const t of e.changedTouches){
  if(t.identifier===moveId){ moveId=null; pointer=null; anchor=null; G.sucking=false; }
  if(t.identifier===fireId){ releaseFire(); }
} }
function release(){ if(fireMouse) releaseFire(); pointer=null; anchor=null; moveId=null; G.sucking=false; }
