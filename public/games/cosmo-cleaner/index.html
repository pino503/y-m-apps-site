function reset(stage){
  stage = stage || 1;
  const cfg = stageCfg(stage);
  G.stage = stage;
  G.loop = loopOf(stage);   // 0 = first run, 1 = NG+ (HARD MODE)
  G.t=0; G.px=WW/2; G.py=WH/2+40; G.camX=0; G.camY=0;
  G.junk=[]; G.shots=[]; G.ebullets=[]; G.missiles=[]; G.flameOrbs=[]; G.mobs=[]; G.parts=[]; G.crates=[]; G.obstacles=[];
  G.planets=[]; G.clouds=[];
  G.flashHp=0; G.hitStop=0; G.bossHitFlash=0;
  G.bossIntro=0; G.phase2Banner=0;
  G.cargo=0; G.cargoMax=BALANCE.player.cargoMax; G.ammo=0; G.sucking=false; G.fireCd=0; G.dockCd=0; G.shake=0; G.puff=0;
  G.collected=0; G.unloaded=0; G.hitsOnBoss=0; G.missed=0; G.junkMass=0; G.collectedMass=0;
  G.crateCd = BALANCE.crate.firstCdMin + Math.random()*BALANCE.crate.firstCdSpread;  // first crate spawn timer
  G.cratesSpawned = 0;  // count of crates spawned this stage (cap = BALANCE.crate.maxPerStage)
  G.crateMsg = '';  G.crateMsgT = 0; G.crateMsgKind = 'reward';  // pop-up message after opening
  G.invuln=0; G.cleanliness=0;
  G.totalJunkAtStart = cfg.junk;        // for cleanliness % denominator
  G.healFlash=0; G.missFlash=0;
  G.bossFound=false; G.bossDowned=false; G.postBossMenuShown=false;
  G.showStageBanner=true;  // shows until the player taps to dismiss
  // PUs: reset only on Stage 1. On stage >=2, clip carried PUs to puCarryByStage[stage].
  // puPicksThisStage / puPicks / puProgress always reset (cost accumulator scoped to the stage).
  if(stage===1){
    G.pu={suck:0,tank:0,power:0,hull:0,shield:0,drone:0};
  } else {
    const cap = BALANCE.puCarryByStage[stage];
    // keys absent from the cap (e.g. drone) carry over fully
    if(cap){ for(const k in G.pu){ if(cap[k]!=null) G.pu[k] = Math.min(G.pu[k], cap[k]); } }
  }
  G.puPicks=0; G.puProgress=0; G.puPicksThisStage=0;
  G.puFlash=0; G.puName=''; G.puCards=null;
  // Recompute HP / cargo / shields from carried PUs (or zeroes on stage 1)
  G.hpMax = BALANCE.player.hp + G.pu.hull;
  G.hp = G.hpMax;   // full heal between stages — survival reward
  G.cargoMax = BALANCE.pu.capacity(G.pu.tank);
  G.shields = [];
  for(let i=0;i<G.pu.shield;i++) G.shields.push({ angle: (i/Math.max(1,G.pu.shield))*Math.PI*2 });
  G.cleanDrones = [];
  for(let i=0;i<(G.pu.drone||0);i++) G.cleanDrones.push({ angle: (i/Math.max(1,G.pu.drone))*Math.PI*2, x:G.px, y:G.py, cargo:0 });
  // junk count from stage config (NG+ loop = more litter to keep clean)
  const junkN = Math.round(cfg.junk * (G.loop>=1 ? 1.4 : 1));
  for(let i=0;i<junkN;i++){
    const k=JUNK_KEYS[Math.floor(Math.random()*JUNK_KEYS.length)];
    spawnJunk(120+Math.random()*(WW-240), 120+Math.random()*(WH-240), k, 0);
  }
  // mobs from stage config — must spawn well away from the base (not near start)
  const MIN_FROM_BASE = BALANCE.world.minMobFromBase;  // > SAFE_R * 3, keeps spawn out of the comfort zone
  for(const kind of Object.keys(cfg.mobs)){
    const mobN = Math.ceil(cfg.mobs[kind] * (G.loop>=1 ? 1.6 : 1));
    for(let i=0;i<mobN;i++){
      let mx,my,tr=0;
      do{ mx=60+Math.random()*(WW-120); my=60+Math.random()*(WH-120); tr++; }
      while(tr<30 && Math.hypot(mx-STATION.x,my-STATION.y)<MIN_FROM_BASE);
      spawnMob(mx,my,kind);
    }
  }
  // NG+ boss is far tankier (player carries full upgrades in) + powered-up name
  spawnBoss(Math.round(cfg.bossHp * (G.loop>=1 ? 2.4 : 1)), cfg.bossSpr, bossNameFor(cfg, G.loop), bossNameJpFor(cfg, G.loop));
  // place static obstacles — far from base, varied sizes for visual variety
  const nObs = cfg.obstacles || 0;
  for(let i=0;i<nObs;i++){
    let ox,oy,tr=0,ok=false;
    while(tr<40 && !ok){
      ox=80+Math.random()*(WW-160); oy=80+Math.random()*(WH-160); tr++;
      ok = Math.hypot(ox-STATION.x,oy-STATION.y) > 220;  // keep base area clear
      // don't overlap with other obstacles
      for(const o of G.obstacles){ if(Math.hypot(o.x-ox,o.y-oy)<o.r+18){ ok=false; break; } }
    }
    if(ok) G.obstacles.push({ x:ox, y:oy, r:10+Math.random()*8, seed:Math.random()*1000, kind: cfg.theme.name });
  }
  // planets — 2-3 distant celestial bodies per stage, themed by accent color
  const tint = cfg.theme.accent;
  const nPlanets = 2 + Math.floor(Math.random()*2);
  for(let i=0;i<nPlanets;i++){
    G.planets.push({
      x: 80+Math.random()*(WW-160),
      y: 80+Math.random()*(WH-160),
      r: 28 + Math.random()*22,           // 28-50 px — clearly larger than any obstacle (max r=18)
      col: tint,
      par: 0.08 + Math.random()*0.08,     // parallax: 0.08-0.16 (very far)
      rotPhase: Math.random()*6.283,
      hasRing: Math.random()<0.3,
      // procedural crater positions (small dim dots so they read as planets not rocks)
      craters: Array.from({length: 3+Math.floor(Math.random()*3)}, ()=>({
        a: Math.random()*6.283, r: 0.3+Math.random()*0.5, sz: 1
      })),
    });
  }
  // ambient nebula clouds — 5-7 soft drifting puffs in stage accent color
  const nClouds = 5 + Math.floor(Math.random()*3);
  for(let i=0;i<nClouds;i++){
    G.clouds.push({
      x: Math.random()*WW,
      y: Math.random()*WH,
      r: 60+Math.random()*60,
      vx: (Math.random()-0.5)*0.04,
      vy: (Math.random()-0.5)*0.04,
      phase: Math.random()*6.283,
      col: tint,
    });
  }
}
// mob types: stats per kind
const MOB_KIND = {
  base:   { r:7, hp:4, sp:0.55, glow:'#c026d3', litter:[160,280], drops:3 },
  gunner: { r:7, hp:6, sp:0.10, glow:'#bef264', litter:[260,400], drops:4, shootCd:[120,180] },
  split:  { r:7, hp:3, sp:0.7,  glow:'#fb7185', litter:[200,340], drops:2, splits:true },
  rush:   { r:5, hp:1, sp:1.35, glow:'#ef4444', litter:[400,800], drops:1 },
};
function spawnMob(x,y,kind){
  kind = kind || 'base';
  const k = MOB_KIND[kind] || MOB_KIND.base;
  G.mobs.push({
    x, y, kind, r:k.r, hp:k.hp, t:Math.random()*6, dirA:Math.random()*6.28,
    litterCd: k.litter[0] + Math.random()*(k.litter[1]-k.litter[0]),
    shootCd: k.shootCd ? k.shootCd[0]+Math.random()*(k.shootCd[1]-k.shootCd[0]) : 0,
    dead:false,
  });
}

/* ---------- BOSS: lurks somewhere in the world; wakes when found ---------- */
function spawnCrate(){
  // place far from base and player (so it rewards exploration)
  let cx,cy,tr=0;
  do{ cx=80+Math.random()*(WW-160); cy=80+Math.random()*(WH-160); tr++; }
  while(tr<25 && (Math.hypot(cx-STATION.x,cy-STATION.y)<260 || Math.hypot(cx-G.px,cy-G.py)<140));
  G.crates.push({ x:cx, y:cy, t:0, opened:false, life:0 });
  // HUD banner so the player knows a crate exists. First time = long tutorial form.
  let seen = false;
  try { seen = !!localStorage.getItem('cosmoc.seenCrate'); } catch(e){}
  if(!seen){
    G.crateMsg = '接近で開封 / HP・PU補給';
    try { localStorage.setItem('cosmoc.seenCrate','1'); } catch(e){}
  } else {
    G.crateMsg = '探索すべし';
  }
  G.crateMsgT = 120;
  G.crateMsgKind = 'spawn';
  // soft chime to alert the player a crate has appeared
  blip(880,.08,'triangle',.04);
  blip(1320,.12,'triangle',.04);
}
function openCrate(cr){
  cr.opened=true;
  // helpers to make each reward branch feel distinct
  function reward(kind){
    G.hitStop = Math.max(G.hitStop, kind==='UPGRADE' ? 8 : 6);
    G.shake = Math.max(G.shake, kind==='UPGRADE' ? 5 : 3);
  }
  function sfxHull(){ blip(660,.10,'square',.07); blip(880,.14,'square',.06); }
  function sfxShield(){ blip(1200,.08,'triangle',.06); blip(1760,.12,'triangle',.05); }
  function sfxUpgrade(){ blip(660,.08,'square',.06); blip(880,.08,'square',.06); blip(1100,.16,'square',.06); }

  // roll reward: HEAL-chain vs UPGRADE (probability from BALANCE.crate.healChance)
  const r = Math.random();
  let msg='', kind='';
  if(r<BALANCE.crate.healChance){
    // HEAL chain: HP first, then SHIELD recharge if HP is full, then UPGRADE.
    if(G.hp < G.hpMax){
      G.hp = Math.min(G.hpMax, G.hp+1); msg='+1 HULL'; kind='HULL';
      burst(cr.x,cr.y,'r',16,1.8);
      shockwave(cr.x, cr.y, '#22ff88', 36, 22);   // green wave — "heal" reads at a glance
      sparks(cr.x, cr.y, '#22ff88', 12, 2.0);
      G.healFlash = 30;
      reward(kind); SFX.dock(); sfxHull();
    } else if(G.shields.length < G.pu.shield){
      G.shields.push({angle: Math.random()*Math.PI*2});
      msg='+1 SHIELD'; kind='SHIELD';
      burst(cr.x,cr.y,'c',16,1.8);
      shockwave(cr.x, cr.y, '#5eead4', 36, 22);
      sparks(cr.x, cr.y, '#a7ffd0', 12, 2.0);
      // extra centered ring on the player so the new drone is obviously theirs
      shockwave(G.px, G.py, '#5eead4', 28, 18);
      reward(kind); SFX.dock(); sfxShield();
    } else {
      G.puPicks+=1; msg='+1 UPGRADE'; kind='UPGRADE';
      burst(cr.x,cr.y,'y',20,2.0);
      shockwave(cr.x, cr.y, '#fde047', 36, 22);
      sparks(cr.x, cr.y, '#fde047', 14, 2.2);
      reward(kind); SFX.dock(); sfxUpgrade(); openPick();
    }
  } else {
    G.puPicks += 1; msg='+1 UPGRADE'; kind='UPGRADE';
    burst(cr.x,cr.y,'y',20,2.0);
    shockwave(cr.x, cr.y, '#fde047', 36, 22);
    sparks(cr.x, cr.y, '#fde047', 14, 2.2);
    reward(kind); SFX.dock(); sfxUpgrade(); openPick();
  }
  G.crateMsg = msg; G.crateMsgT = 100; G.crateMsgKind = 'reward';
}

function spawnBoss(hpMax, spr, name, nameJp){
  hpMax = hpMax || 140;
  spr = spr || 'boss';
  let bx,by,tries=0;
  do{ bx=80+Math.random()*(WW-160); by=80+Math.random()*(WH-160); tries++; }
  while(tries<40 && Math.hypot(bx-STATION.x,by-STATION.y)<450);
  // tall sprites (boss3 kaiju, boss5 humanoid) get a taller, narrower hitbox
  const tall = (spr==='boss5' || spr==='boss3');
  const w = tall ? 26 : 30;
  const h = tall ? 34 : 24;
  G.boss = {
    x:bx, y:by, w, h, hp:hpMax, hpMax:hpMax, spr, name:(name||'BOSS'), nameJp:(nameJp||''),
    t:0, awake:false, dead:false, dieT:0,
    spitCd:70, missileCd:160, driftA:Math.random()*6.28,
    phase:1,
    // PHASE 2 aimed-laser state (idle in phase 1)
    laserCd:240,   // frames until next telegraph (cools 240 → 0)
    laserT:0,      // >0 = telegraphing; ticks down to 0 then fires
    laserFire:0,   // >0 = beam is firing this frame (hits player on overlap)
    laserAng:0,    // locked angle: snapshot of player direction at telegraph start
    // GOMILLA (boss3): flame-wrapped junk orb
    flameCd: 160, flameT: 0, flameAng: 0,
    // JUNK CORE (boss): orbiting junk satellites (damage-dealing)
    orbCount: 4, orbAng: 0,
    // IRON HUSK (boss2): dash charge
    dashCd: 250, dashT: 0, dashFire: 0, dashAng: 0, dashSpd: 5.5,
    // VOID LEVIATHAN (boss4): short-range teleport
    tpCd: 340, tpT: 0, tpAlpha: 1, tpTX: 0, tpTY: 0,
    // PROGENITOR (boss5): minion summon
    summonCd: 380, summonT: 0,
  };
}
function updateBoss(){
  const b=G.boss; if(!b) return;
  b.t++;
  if(b.dead){
    b.dieT++;
    if(b.dieT%4===0){
      const ex=b.x+(Math.random()*46-23), ey=b.y+(Math.random()*32-16);
      burst(ex, ey, (b.dieT>>2&1)?'m':'G', 12,1.6);
      shockwave(ex, ey, '#fbbf24', 18+Math.random()*12, 14);
      sparks(ex, ey, '#fde047', 6, 2.0);
      if(b.dieT%8===0) smoke(ex, ey, 4);
      SFX.bosshit();
    }
    if(b.dieT>=56){
      for(let i=0;i<50;i++) burst(b.x,b.y,(i&1)?'c':'w',1,2.2);
      // grand finale: multi-ring explosion + lots of sparks + smoke pillar
      shockwave(b.x, b.y, '#fde047', 80, 32);
      shockwave(b.x, b.y, '#22ff88', 100, 36);
      shockwave(b.x, b.y, '#a7ffd0', 140, 44);
      sparks(b.x, b.y, '#fde047', 30, 3.0);
      sparks(b.x, b.y, '#22ff88', 24, 2.5);
      smoke(b.x, b.y, 20);
      G.cleanliness=1; G.boss=null; G.bossDowned=true; G.shake=Math.max(G.shake,14); setBGM('explore'); SFX.clear();
    }
    return;
  }
  const dist=Math.hypot(G.px-b.x, G.py-b.y);
  if(!b.awake){
    // dormant: drift slowly. Wake when the player gets close.
    b.driftA += (Math.random()-0.5)*0.05;
    b.x += Math.cos(b.driftA)*0.25; b.y += Math.sin(b.driftA)*0.25;
    b.x=Math.max(40,Math.min(WW-40,b.x)); b.y=Math.max(40,Math.min(WH-40,b.y));
    if(dist<90){
      b.awake=true; G.bossFound=true;
      G.bossIntro = 80;          // dramatic reveal banner timer
      G.shake = Math.max(G.shake, 6);
      shockwave(b.x, b.y, '#ef4444', 80, 32);
      shockwave(b.x, b.y, '#fb7185', 50, 28);
      sparks(b.x, b.y, '#ef4444', 14, 2.2);
      smoke(b.x, b.y, 6);
      SFX.missile(); SFX.bosshit(); setBGM('boss');
    }
    return;
  }
  // awake: slowly chases the player around the field while attacking
  const dx=G.px-b.x, dy=G.py-b.y, d=Math.hypot(dx,dy)||1;
  // suppress seek during IRON HUSK dash or VOID LEVIATHAN vanish phase
  const seekMul = (b.spr==='boss2' && b.dashFire>0) ? 0
                : (b.spr==='boss4' && b.tpT>30) ? 0 : 1;
  b.x += dx/d*0.50*seekMul; b.y += dy/d*0.50*seekMul;
  b.x=Math.max(40,Math.min(WW-40,b.x)); b.y=Math.max(40,Math.min(WH-40,b.y));
  // boss can't enter the safe zone either
  const bsx=b.x-STATION.x, bsy=b.y-STATION.y, bsd=Math.hypot(bsx,bsy);
  const bossSafeR = SAFE_R + 130;  // wide buffer so the boss never looms near the base perimeter (v1.1.0)
  if(bsd<bossSafeR){
    const f=bossSafeR/(bsd||1);
    b.x = STATION.x + bsx*f; b.y = STATION.y + bsy*f;
  }
  // NG+ (HARD MODE) cranks attack tempo + projectile speed
  const hardCd = G.loop>=1 ? 0.72 : 1, hardSp = G.loop>=1 ? 1.28 : 1;
  // spit junk (suckable) — p1 random ring; p2/p3 a rotating SPIRAL with one aimed shot
  b.spitCd--;
  if(b.spitCd<=0){
    const p3=b.phase>=3, p2=b.phase>=2;
    const baseN = p3 ? 9 : p2 ? 6 : 3;
    const n=baseN+Math.floor(Math.random()*2) + (G.loop>=1?2:0);
    const spitSp = p3 ? 1.7 : p2 ? 1.4 : 1.0;
    b.spitBase = (b.spitBase||0) + 0.4;             // advance base angle each volley → spiral
    const aimed = Math.atan2(G.py-b.y, G.px-b.x);   // first shot tracks the player in p2/p3
    for(let i=0;i<n;i++){
      const ang = p2
        ? ((i===0) ? aimed : b.spitBase + i*(6.283/n))   // spiral + aimed lead shot
        : Math.random()*6.283;                            // p1 stays a loose random ring
      const sp=(spitSp+Math.random()*0.5)*hardSp;
      const key=JUNK_KEYS[Math.floor(Math.random()*JUNK_KEYS.length)];
      G.ebullets.push({ x:b.x, y:b.y, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, key, t:0, danger:true });
      G.junkMass += JUNK[key].weight;
    }
    SFX.rebreak();
    const base = p3 ? 30 : p2 ? 50 : 70;
    b.spitCd=Math.round(Math.max(p3?14:24, base-Math.floor((1-b.hp/b.hpMax)*40))*hardCd);
  }
  // missiles: aimed, unsuckable, must dodge — phase 2 fires extra
  b.missileCd--;
  if(b.missileCd<=0){
    const prog=1-b.hp/b.hpMax, p3=b.phase>=3;
    const count = (b.phase>=2 ? 2 : 1) + Math.floor(prog*2) + (p3?1:0);
    for(let i=0;i<count;i++){
      const mdx=G.px-b.x, mdy=G.py-b.y, md=Math.hypot(mdx,mdy)||1;
      const spread=(count>1)?(i-(count-1)/2)*0.16:0;
      const ca=Math.cos(spread), sa=Math.sin(spread);
      const nx=mdx/md, ny=mdy/md, sp=(p3?3.4:b.phase>=2?3.0:2.6)*hardSp;
      G.missiles.push({ x:b.x, y:b.y, vx:(nx*ca-ny*sa)*sp, vy:(nx*sa+ny*ca)*sp, t:0, warn:18 });
    }
    SFX.missile();
    const base = p3 ? 80 : b.phase>=2 ? 110 : 160;
    b.missileCd=Math.round(Math.max(p3?40:50, base-Math.floor(prog*70))*hardCd);
  }
  // PHASE 2 only: aimed-laser. Telegraph (50f) → fire (10f) → cd (180f).
  // Angle locks AT TELEGRAPH START so the player can dodge perpendicularly.
  if(b.phase>=2){
    if(b.laserT>0){
      b.laserT--;
      if(b.laserT===0){ b.laserFire = 10; SFX.bosshit(); G.shake = Math.max(G.shake, 4); }
    } else if(b.laserFire>0){
      b.laserFire--;
      if(G.invuln<=0){
        const dxL=Math.cos(b.laserAng), dyL=Math.sin(b.laserAng);
        const rxL=G.px-b.x, ryL=G.py-b.y;
        const tAlong = rxL*dxL + ryL*dyL;
        if(tAlong>0){
          const perp = Math.abs(rxL*(-dyL) + ryL*dxL);
          if(perp < 4) hurt();   // ~5px beam half-width + small player tolerance
        }
      }
    } else {
      b.laserCd--;
      if(b.laserCd<=0){
        b.laserT = 50;
        b.laserAng = Math.atan2(G.py-b.y, G.px-b.x);  // lock now; telegraph is honest
        b.laserCd = Math.round((b.phase>=3 ? 120 : 180) * hardCd);
        blip(220,.10,'sawtooth',.05);   // soft warning chirp
      }
    }
  }

  /* ---- per-boss signature behavior ---- */

  // JUNK CORE (boss): orbiting junk satellites — passive (advance angle only; collision handled in update())
  if(b.spr==='boss'){
    b.orbCount = b.phase>=3 ? 8 : b.phase>=2 ? 6 : 4;
    b.orbAng += b.phase>=3 ? 0.09 : b.phase>=2 ? 0.07 : 0.05;
  }

  // IRON HUSK (boss2): telegraphed dash charge
  if(b.spr==='boss2'){
    if(b.dashFire>0){
      // dash in motion
      b.x += Math.cos(b.dashAng)*b.dashSpd;
      b.y += Math.sin(b.dashAng)*b.dashSpd;
      b.x=Math.max(40,Math.min(WW-40,b.x)); b.y=Math.max(40,Math.min(WH-40,b.y));
      // keep dasher out of safe zone too
      const dsx=b.x-STATION.x, dsy=b.y-STATION.y, dsd=Math.hypot(dsx,dsy);
      if(dsd<SAFE_R+80){ const f=(SAFE_R+80)/(dsd||1); b.x=STATION.x+dsx*f; b.y=STATION.y+dsy*f; b.dashFire=0; }
      b.dashFire--;
      if(b.dashFire<=0){
        shockwave(b.x,b.y,'#fbbf24',24,16);
        // combo: chain another dash (re-aim at player) — p2: 2 dashes, p3: 3
        if(b.dashCombo>0){ b.dashCombo--; b.dashT=14; b.dashAng=Math.atan2(G.py-b.y,G.px-b.x); sparks(b.x,b.y,'#fde047',6,2.0); }
      }
    } else if(b.dashT>0){
      b.dashT--;
      if(b.dashT<=0){
        b.dashFire = 30;
        sparks(b.x, b.y, '#fde047', 8, 2.2);
        SFX.missile();
      }
    } else {
      b.dashCd--;
      if(b.dashCd<=0){
        b.dashT = 40;
        b.dashAng = Math.atan2(G.py-b.y, G.px-b.x);
        b.dashCombo = b.phase>=3 ? 2 : b.phase>=2 ? 1 : 0;   // extra chained dashes
        b.dashCd = b.phase>=2 ? 170 : 250;
        blip(180,.10,'square',.05);
      }
    }
  }

  // GOMILLA (boss3): flame-wrapped junk orb (single straight projectile)
  if(b.spr==='boss3'){
    if(b.flameT>0){
      b.flameT--;
      if(b.flameT<=0){
        const sp = 2.0;
        const ways = b.phase>=3 ? 5 : b.phase>=2 ? 3 : 1;   // single → 3-way fan → 5-way
        for(let k=0;k<ways;k++){
          const a = b.flameAng + (k-(ways-1)/2)*0.30;
          G.flameOrbs.push({ x:b.x, y:b.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, t:0, life:360, dead:false });
        }
        SFX.rebreak(); SFX.bosshit();
      }
    } else {
      b.flameCd--;
      if(b.flameCd<=0){
        b.flameT = 30;
        b.flameAng = Math.atan2(G.py-b.y, G.px-b.x);
        b.flameCd = b.phase>=2 ? 100 : 160;
        blip(140,.12,'sawtooth',.06);
      }
    }
  }

  // VOID LEVIATHAN (boss4): short-range teleport
  if(b.spr==='boss4'){
    if(b.tpT>0){
      if(b.tpT>30){
        // vanishing — fade out, drop smoke
        b.tpAlpha = Math.max(0, (b.tpT-30)/30);
        if((G.t&3)===0) smoke(b.x, b.y, 2);
      } else if(b.tpT===30){
        // teleport moment
        b.x = b.tpTX; b.y = b.tpTY;
        shockwave(b.x, b.y, '#a78bfa', 36, 18);
        sparks(b.x, b.y, '#c4b5fd', 12, 2.4);
        SFX.bosshit();
        b.tpAlpha = 0;
      } else {
        // re-appearing — fade in
        b.tpAlpha = Math.min(1, (30-b.tpT)/30);
      }
      b.tpT--;
      if(b.tpT<=0){
        b.tpAlpha = 1;
        // ambush: burst a junk ring on arrival (p2+)
        if(b.phase>=2){
          const ways=b.phase>=3?12:8;
          for(let k=0;k<ways;k++){ const a=k*(6.283/ways), sp=1.6;
            const key=JUNK_KEYS[Math.floor(Math.random()*JUNK_KEYS.length)];
            G.ebullets.push({x:b.x,y:b.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,key,t:0,danger:true});
            G.junkMass+=JUNK[key].weight;
          }
          shockwave(b.x,b.y,'#c4b5fd',30,16); SFX.rebreak();
        }
      }
    } else {
      b.tpCd--;
      if(b.tpCd<=0){
        b.tpT = 60;
        const ang = Math.random()*6.283;
        const dist = 80 + Math.random()*30;
        b.tpTX = Math.max(40, Math.min(WW-40, G.px + Math.cos(ang)*dist));
        b.tpTY = Math.max(40, Math.min(WH-40, G.py + Math.sin(ang)*dist));
        // avoid teleporting into safe zone
        const tsx=b.tpTX-STATION.x, tsy=b.tpTY-STATION.y, tsd=Math.hypot(tsx,tsy);
        if(tsd<SAFE_R+140){ const f=(SAFE_R+140)/(tsd||1); b.tpTX=STATION.x+tsx*f; b.tpTY=STATION.y+tsy*f; }
        b.tpCd = b.phase>=2 ? 210 : 340;
        blip(280,.14,'sine',.06);
      }
    }
  }

  // PROGENITOR (boss5): minion summon
  if(b.spr==='boss5'){
    if(b.summonT>0){
      b.summonT--;
      if(b.summonT<=0){
        // summon if mob count is reasonable
        if((G.mobs||[]).filter(m=>!m.dead).length < 9){
          const count = b.phase>=3 ? 4 : b.phase>=2 ? 3 : 1;
          for(let i=0;i<count;i++){
            const ang = Math.random()*6.283;
            const sx0 = b.x + Math.cos(ang)*22;
            const sy0 = b.y + Math.sin(ang)*22;
            const kind = (b.phase>=3 && i===0) ? 'rush' : 'split';   // p3 mixes in an aggressive rusher
            spawnMob(sx0, sy0, kind);
            shockwave(sx0, sy0, '#fde047', 18, 12);
          }
        }
      }
    } else {
      b.summonCd--;
      if(b.summonCd<=0){
        b.summonT = 40;
        b.summonCd = b.phase>=2 ? 250 : 380;
        blip(440,.10,'triangle',.06);
      }
    }
  }
}
function hitBoss(dmg){
  const b=G.boss; if(!b||b.dead) return;
  if(!b.awake){ b.awake=true; G.bossFound=true; setBGM('boss'); }
  b.hp-=dmg; G.hitsOnBoss++;
  G.bossHitFlash = 8;  // HP bar pulses white briefly
  // PHASE TRANSITION at 50% HP — ENRAGED
  if(b.phase===1 && b.hp <= b.hpMax*0.5){
    b.phase=2; b.phaseTime=G.t;
    b.spitCd=10; b.missileCd=30;
    G.shake = Math.max(G.shake, 8);
    G.phase2Banner = 90; G.bannerKind='p2';     // big red ENRAGED banner
    // dramatic phase 2 entry — multiple shockwaves + sparks + smoke
    shockwave(b.x, b.y, '#ef4444', 60, 26);
    shockwave(b.x, b.y, '#fbbf24', 40, 22);
    sparks(b.x, b.y, '#fbbf24', 18, 2.6);
    sparks(b.x, b.y, '#ef4444', 14, 2.0);
    smoke(b.x, b.y, 8);
    SFX.missile(); SFX.bosshit();
  }
  // OVERDRIVE at 25% HP — final desperation onslaught
  else if(b.phase===2 && b.hp <= b.hpMax*0.25){
    b.phase=3; b.phaseTime=G.t;
    b.spitCd=8; b.missileCd=20; b.laserCd=40;
    G.shake = Math.max(G.shake, 12);
    G.phase2Banner = 90; G.bannerKind='p3';      // magenta/white OVERDRIVE banner
    shockwave(b.x, b.y, '#e879f9', 80, 32);
    shockwave(b.x, b.y, '#ffffff', 50, 26);
    sparks(b.x, b.y, '#e879f9', 22, 3.0);
    sparks(b.x, b.y, '#ffffff', 16, 2.4);
    smoke(b.x, b.y, 10);
    SFX.missile(); SFX.bosshit(); SFX.hurt();
  }
  if(b.hp<=0){ b.hp=0; b.dead=true; b.dieT=0; }
}

/* ---------- helpers ---------- */
function spawnJunk(x,y,key,vy0){
  const def=JUNK[key];
  G.junk.push({ key, x:(x==null?30+Math.random()*(WW-60):x), y:(y==null?30+Math.random()*(WH-60):y),
                vx:(Math.random()*0.5-0.25), vy:(vy0!=null?vy0:(Math.random()*0.5-0.25)),
                t:Math.random()*6 });
  G.junkMass += def.weight;  // counts toward the cleanup % denominator
}
function burst(x,y,col,n,spd){
  for(let i=0;i<n;i++){ const a=Math.random()*6.283, s=(spd||1)*(0.3+Math.random()*1.8);
    const life=12+Math.random()*16;
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,col,kind:'pixel'}); }
}
// expanding ring — used for impacts, deaths, phase transitions
function shockwave(x,y,col,maxR,life){
  life = life || 18;
  G.parts.push({x,y,vx:0,vy:0,life,maxLife:life,col,kind:'ring',r:0,maxR:maxR||30});
}
// bright spark with short trail — used for hits, sparks
function sparks(x,y,col,n,spd){
  for(let i=0;i<n;i++){ const a=Math.random()*6.283, s=(spd||1.5)*(0.8+Math.random()*1.6);
    const life=14+Math.random()*10;
    G.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,col,kind:'spark',trail:[]}); }
}
// soft smoke puff — drifts and grows, fades out
function smoke(x,y,n){
  for(let i=0;i<n;i++){ const a=Math.random()*6.283, s=0.2+Math.random()*0.5;
    const life=30+Math.random()*24;
    G.parts.push({x:x+Math.random()*4-2,y:y+Math.random()*4-2,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.2,life,maxLife:life,col:'#3a4a55',kind:'smoke',size:2+Math.random()*2}); }
}

/* ---------- upgrade picking (pauses the game) ---------- */
function openPick(){
  if(G.puPicks<=0 || G.puCards) return;
  // exclude upgrades that hit their per-type cap (no absolute cap during stage —
  // carryover to next stage is what's bounded, via BALANCE.puCarryByStage).
  const avail = PU_DEFS.filter(d => G.pu[d.k] < PU_MAX[d.k]);
  if(avail.length===0){
    // all upgrades maxed — drain remaining picks silently
    G.puPicks=0; G.puProgress=0; return;
  }
  G.puCards = avail;
  G.sucking=false; pointer=null; anchor=null; moveId=null;
  G.state='pick';
}
function choosePick(idx){
  if(G.state!=='pick' || !G.puCards) return;
  const def=G.puCards[idx]; if(!def) return;
  G.pu[def.k]++; G.puPicksThisStage++; G.puName=def.name; G.puFlash=60;
  // HULL: bump hpMax and refill HP immediately
  if(def.k==='hull'){
    G.hpMax = BALANCE.player.hp + G.pu.hull;
    G.hp = G.hpMax;
  }
  // SHIELD: spawn a new orbiting drone
  if(def.k==='shield'){
    G.shields.push({angle: Math.random()*Math.PI*2});
  }
  // CLEANER: spawn a new auto-vacuum drone
  if(def.k==='drone'){
    G.cleanDrones.push({angle: Math.random()*Math.PI*2, x:G.px, y:G.py, cargo:0});
  }
  SFX.dock();
  G.puPicks--;
  G.puCards=null;
  if(G.puPicks>0){ openPick(); }   // more queued? show next
  else { G.state='play'; }
}

/* ---------- post-boss menu: choose next stage or keep cleaning ---------- */
function choosePostBoss(idx){
  if(G.state!=='postBoss') return;
  if(idx===0){
    // Continue cleaning. Hold off the menu until the player leaves the dock,
    // then re-arm it so re-docking opens the menu again.
    G.postBossMenuShown=true; G.state='play';
    SFX.dock();
  } else if(idx===1){
    // Advance to next stage — or finish if final
    if(G.stage >= TOTAL_STAGES){
      G.state='clear'; G.t=0; stopBGM(); SFX.clear();
    } else {
      // accumulate cleanup for the final ranking (carry totals across stages)
      G.totalMass = (G.totalMass||0) + G.junkMass;
      G.totalCollected = (G.totalCollected||0) + G.collectedMass;
      reset(G.stage+1); G.state='play';
      setBGM('explore');
      SFX.dock();
    }
  }
}

/* ---------- fire a compressed shot at the nearest enemy ----------
   charged=true fires a big piercing blast for 3 ammo (held FIRE → release). */
function fire(charged){
  if(G.state!=='play' || G.fireCd>0) return;
  if(charged && G.ammo < 3) charged=false;        // not enough juice for a blast — fire a normal shot
  const cost = charged ? 3 : 1;
  if(G.ammo < cost){ blip(160,.08,'square',.05); return; }
  // can't fire from inside the safe zone — base is a sanctuary, not a turret
  if(Math.hypot(G.px-STATION.x, G.py-STATION.y) < SAFE_R){
    blip(140,.06,'square',.04);
    G.fireCd = BALANCE.shot.cdInSafeZone;
    return;
  }
  G.ammo -= cost;
  // aim at the NEAREST enemy — mobs and the awake boss compete on distance,
  // so a close zako is hit even while a boss looms far away. Falls back to
  // straight up when nothing's around.
  let tx=G.px, ty=G.py-100, target=null, nd=1e9;
  for(const mo of G.mobs){ if(mo.dead) continue; const d=Math.hypot(mo.x-G.px,mo.y-G.py); if(d<nd){ nd=d; target=mo; } }
  if(G.boss && G.boss.awake && !G.boss.dead){
    const d=Math.hypot(G.boss.x-G.px, G.boss.y-G.py);
    if(d<nd){ nd=d; target={x:G.boss.x, y:G.boss.y}; }
  }
  if(target){ tx=target.x; ty=target.y; }
  const dx=tx-G.px, dy=ty-G.py, d=Math.hypot(dx,dy)||1;
  const sp = BALANCE.shot.speed + G.pu.power * BALANCE.shot.speedPerPowerLv;
  const vx=dx/d*sp, vy=dy/d*sp;
  // PWR-scaled shot: bigger radius, optional piercing (Lv3+ = 1, Lv5 = 2).
  // A charged blast is much larger, hits hard, and pierces through a crowd.
  const pLv = G.pu.power;
  const baseR = BALANCE.shot.r + Math.floor(pLv/2);                  // 5 → 7 at Lv5
  const shotR = charged ? baseR*2 : baseR;
  const pierce = charged ? 6 : (pLv >= 5 ? 2 : pLv >= 3 ? 1 : 0);
  const dmg = charged ? shotPower()*3 : shotPower();
  G.shots.push({ x:G.px, y:G.py, vx, vy, r:shotR, dmg,
                 hits:0, pierce, life:BALANCE.shot.life, trail:[], pLv, charged:!!charged });
  G.fireCd = charged ? BALANCE.shot.fireCd*2 : BALANCE.shot.fireCd;
  SFX.fire(charged ? 2.4 : 1.4 + pLv*0.08);
  burst(G.px,G.py,'c', charged?14:6, charged?2.4:1.5);
}
// resolve a FIRE-button release: a long enough hold fires a charged blast, else a tap shot.
function releaseFire(){
  if(!G.charging) return;
  const held=G.chargeT;
  G.charging=false; G.chargeT=0; fireId=null; fireMouse=false;
  fire(held >= CHARGE_FULL);
}

// swallow one piece of junk into the tank — shared by the roomba's own suction
// and by the auto-cleaner drones, so both feel/sound identical (pop + gulp).
function collectJunk(j){
  const def=JUNK[j.key], CAP=cargoCap();
  G.cargo=Math.min(CAP,G.cargo+def.weight);
  G.collected++; G.collectedMass+=def.weight;
  SFX.collect(Math.min(1,G.cargo/CAP));
  G.puff=1;
  burst(j.x,j.y,'c',5,1.2); j.dead=true;
}
// a cleaner drone swallows a piece into its OWN buffer (50% of ship tank).
// The ship doesn't pop here — the drone ate it, not the roomba.
function swallowToDrone(dr, j){
  const def=JUNK[j.key], dcap=droneCap();
  dr.cargo=Math.min(dcap, (dr.cargo||0)+def.weight);
  G.collected++; G.collectedMass+=def.weight;
  SFX.collect(Math.min(1, dr.cargo/dcap));
  burst(j.x,j.y,'c',5,1.2); j.dead=true;
}

/* ============================================================
   UPDATE
   ============================================================ */
function update(){
  G.t++;
  if(G.puff>0.001) G.puff*=0.80; else G.puff=0;   // pop decays back to rest in a few frames
  if(G.puFlash>0) G.puFlash--;
  if(G.flashHp>0) G.flashHp--;
  if(G.bossHitFlash>0) G.bossHitFlash--;
  if(G.bossIntro>0) G.bossIntro--;
  if(G.phase2Banner>0) G.phase2Banner--;
  // hit-stop: freeze gameplay for a few frames after a heavy impact (player hurt)
  if(G.hitStop>0){ G.hitStop--; return; }

  if(G.state!=='play') return;
  // hold the world frozen while the stage-intro banner is up — player taps to dismiss
  if(G.showStageBanner) return;

  // FIRE-button charge build-up — rising whine, "ready" chime when full
  if(G.charging){
    G.chargeT++;
    if(G.chargeT<=CHARGE_FULL && (G.chargeT%5)===0) SFX.charge(Math.floor(G.chargeT/5));
    if(G.chargeT===CHARGE_FULL) SFX.purify();
  }

  // Heavier when cargo full, faster with speed PU.
  const heavy = (1 - (G.cargo/cargoCap())*0.4) * moveScale();
  if(pointer && anchor){
    if(pointerIsTouch){
      // ぷにコン (floating virtual stick): velocity from how far the finger is
      // tilted off the touch-origin. Direction = where you push, speed scales
      // with tilt distance (dead zone near centre, capped at STICK_MAX).
      const DEAD=5, STICK_MAX=34, MAXSPD=3.36;   // MAXSPD matches keyboard feel
      let dx=pointer.x-anchor.fx, dy=pointer.y-anchor.fy, dist=Math.hypot(dx,dy);
      // follow-thumb: when dragged past the rim, recentre the stick under the
      // thumb so the player can keep pushing without running out of finger room.
      if(dist>STICK_MAX){
        anchor.fx=pointer.x-dx/dist*STICK_MAX; anchor.fy=pointer.y-dy/dist*STICK_MAX;
        dx=pointer.x-anchor.fx; dy=pointer.y-anchor.fy; dist=STICK_MAX;
      }
      if(dist>DEAD){
        const mag=Math.min(1,(dist-DEAD)/(STICK_MAX-DEAD));   // 0 at dead zone -> 1 at rim
        const sp=MAXSPD*mag*heavy;
        G.px+=dx/dist*sp; G.py+=dy/dist*sp;
      }
    } else {
      // mouse: relative drag — ship eases toward the dragged offset, then holds.
      const SENS=1.2;
      const tx=anchor.sx+(pointer.x-anchor.fx)*SENS, ty=anchor.sy+(pointer.y-anchor.fy)*SENS;
      G.px+=(tx-G.px)*0.15*heavy; G.py+=(ty-G.py)*0.15*heavy;
    }
  }
  let kx=0,ky=0;
  if(keys.ArrowLeft||keys.a) kx-=1; if(keys.ArrowRight||keys.d) kx+=1;
  if(keys.ArrowUp||keys.w) ky-=1; if(keys.ArrowDown||keys.s) ky+=1;
  G.px+=kx*3.36*heavy; G.py+=ky*3.36*heavy;
  G.px=Math.max(6,Math.min(WW-6,G.px)); G.py=Math.max(6,Math.min(WH-6,G.py));
  // resolve collision with static obstacles (push player out)
  for(const o of G.obstacles){
    const dx=G.px-o.x, dy=G.py-o.y, d=Math.hypot(dx,dy);
    const minD = o.r + 5;
    if(d < minD){
      if(d < 0.01){
        // exactly on center: pop straight up
        G.px = o.x; G.py = o.y - minD;
      } else {
        G.px = o.x + dx/d*minD;
        G.py = o.y + dy/d*minD;
      }
    }
  }

  // camera follows the player, clamped to world bounds
  const tcx=G.px-LW/2, tcy=G.py-LH/2;
  G.camX += (tcx-G.camX)*0.15; G.camY += (tcy-G.camY)*0.15;
  G.camX=Math.max(0,Math.min(WW-LW,G.camX)); G.camY=Math.max(0,Math.min(WH-LH,G.camY));
  // shake decays each frame
  if(G.shake>0) G.shake = Math.max(0, G.shake-0.6);

  if(G.fireCd>0) G.fireCd--;

  // ---- boss ----
  if(G.boss) updateBoss();
  if(G.invuln>0) G.invuln--;
  if(G.dockCd>0) G.dockCd--;

  // ---- suction: round roomba pulls junk & boss-spit from ALL directions ----
  // (disabled entirely when the cargo tank is full — must unload at the base first)
  const nozX=G.px, nozY=G.py, RNG=suckRange(), CAP=cargoCap();
  const tankFull = G.cargo>=CAP;
  if(G.sucking && !tankFull){
    if((G.t&3)===0) SFX.slurp(Math.min(1,G.cargo/CAP));   // throttle the hum to ~15/s
    const suck = (arr)=>{
      for(const j of arr){
        // skip dead items, and skip gunner bullets (fromMob): they're pure
        // damage projectiles and visually rendered red — not suckable
        if(j.dead || j.fromMob) continue;
        const dx=nozX-j.x, dy=nozY-j.y, d=Math.hypot(dx,dy)||1;
        if(d<RNG){
          const pull=(1-d/RNG)*0.95;
          j.vx+=dx/d*pull; j.vy+=dy/d*pull;
          if(d<9){ collectJunk(j); }   // pop + gulp (see collectJunk)
        }
      }
    };
    suck(G.junk);
    suck(G.ebullets);  // suck up the boss's spit attacks
  }

  // ---- free junk physics: more friction, soft bounces, strong inward push near edges
  for(const j of G.junk){
    j.t+=0.05; j.x+=j.vx; j.y+=j.vy;
    j.vx*=0.96; j.vy*=0.96; // strong drag so debris settles rather than ricocheting
    // edge-repulsion: when near a wall, push the junk inward (kills the "everything piles at edges" effect)
    const EDGE=140;
    if(j.x<EDGE)     j.vx += 0.04*(1-j.x/EDGE);
    if(j.x>WW-EDGE)  j.vx -= 0.04*(1-(WW-j.x)/EDGE);
    if(j.y<EDGE)     j.vy += 0.04*(1-j.y/EDGE);
    if(j.y>WH-EDGE)  j.vy -= 0.04*(1-(WH-j.y)/EDGE);
    // soft wall: clamp without high-energy bounce
    if(j.x<=6){ j.x=6; if(j.vx<0) j.vx*=-0.2; }
    if(j.x>=WW-6){ j.x=WW-6; if(j.vx>0) j.vx*=-0.2; }
    if(j.y<=6){ j.y=6; if(j.vy<0) j.vy*=-0.2; }
    if(j.y>=WH-6){ j.y=WH-6; if(j.vy>0) j.vy*=-0.2; }
  }
  G.junk=G.junk.filter(j=>!j.dead);

  // ---- MOBS: per-kind behavior. base=wander, gunner=stationary turret, split=fast wobble, rush=charge ----
  for(const mo of G.mobs){
    if(mo.dead) continue;
    const k = MOB_KIND[mo.kind] || MOB_KIND.base;
    mo.t+=0.05;
    const dpx=G.px-mo.x, dpy=G.py-mo.y, dp=Math.hypot(dpx,dpy)||1;
    // aim by kind
    if(mo.kind==='rush'){
      // RUSH: relentless dash toward player
      mo.dirA = Math.atan2(dpy,dpx);
    } else if(mo.kind==='gunner'){
      // GUNNER: barely drifts, turns to face the player slowly
      mo.dirA += (Math.atan2(dpy,dpx)-mo.dirA)*0.02;
    } else {
      // base / split
      if(dp<120){ mo.dirA = Math.atan2(dpy,dpx); }
      else { mo.dirA += (Math.random()-0.5)*0.1; }
    }
    // SAFE ZONE — keep enemies well clear of the base (not just touching the edge)
    const sdx=mo.x-STATION.x, sdy=mo.y-STATION.y, sd=Math.hypot(sdx,sdy)||1;
    const BUFFER = SAFE_R + 40;  // wide buffer zone where steering kicks in
    if(sd<BUFFER){
      // bend dirA hard toward "away from base"
      const awayA = Math.atan2(sdy,sdx);
      let d=awayA-mo.dirA;
      while(d>Math.PI) d-=Math.PI*2; while(d<-Math.PI) d+=Math.PI*2;
      // closer to base = stronger turn
      const strength = 0.35 * (1 - (sd-SAFE_R)/(BUFFER-SAFE_R));
      mo.dirA += d*Math.max(0.15, strength);
    }
    // edge avoidance
    const MEDGE=160;
    if(mo.x<MEDGE || mo.x>WW-MEDGE || mo.y<MEDGE || mo.y>WH-MEDGE){
      const toCenter=Math.atan2(WH/2-mo.y, WW/2-mo.x);
      let d=toCenter-mo.dirA;
      while(d>Math.PI) d-=Math.PI*2; while(d<-Math.PI) d+=Math.PI*2;
      mo.dirA += d*0.05;
    }
    // move (kind-specific speed; gunner barely moves)
    const sp = k.sp;
    if(mo.kind==='gunner'){
      // small drift only
      mo.x += Math.sin(mo.t*0.3)*0.15; mo.y += Math.cos(mo.t*0.27)*0.15;
    } else if(mo.kind==='split'){
      // wobble + travel
      mo.x += Math.cos(mo.dirA)*sp + Math.sin(mo.t*1.2)*0.4;
      mo.y += Math.sin(mo.dirA)*sp + Math.cos(mo.t*1.2)*0.4;
    } else {
      mo.x += Math.cos(mo.dirA)*sp + Math.sin(mo.t)*0.2;
      mo.y += Math.sin(mo.dirA)*sp + Math.cos(mo.t)*0.2;
    }
    mo.x=Math.max(8,Math.min(WW-8,mo.x)); mo.y=Math.max(8,Math.min(WH-8,mo.y));
    // hard-clamp out of the safe zone — push out PAST the boundary, plus the mob's radius
    const sd2x=mo.x-STATION.x, sd2y=mo.y-STATION.y, sd2=Math.hypot(sd2x,sd2y);
    const minDist = SAFE_R + mo.r + 4;  // boundary + mob radius + margin
    if(sd2<minDist){
      const f=minDist/(sd2||1);
      mo.x = STATION.x + sd2x*f; mo.y = STATION.y + sd2y*f;
      // also kill any inward velocity by rotating dirA outward
      mo.dirA = Math.atan2(sd2y,sd2x);
    }
    // GUNNER: periodic aimed shot (joins ebullets but as a fast danger shot, NOT junk)
    if(mo.kind==='gunner'){
      mo.shootCd--;
      if(mo.shootCd<=0){
        const adx=G.px-mo.x, ady=G.py-mo.y, ad=Math.hypot(adx,ady)||1;
        const sp=1.8;
        G.ebullets.push({ x:mo.x, y:mo.y, vx:adx/ad*sp, vy:ady/ad*sp, key:'scrap', t:0, danger:true, fromMob:true });
        SFX.missile();
        mo.shootCd = k.shootCd[0]+Math.random()*(k.shootCd[1]-k.shootCd[0]);
      }
    }
    // litter
    mo.litterCd--;
    if(mo.litterCd<=0){
      spawnJunk(mo.x+(Math.random()*16-8), mo.y+(Math.random()*16-8), JUNK_KEYS[Math.floor(Math.random()*JUNK_KEYS.length)], 0);
      mo.litterCd = k.litter[0] + Math.random()*(k.litter[1]-k.litter[0]);
    }
    // contact damage
    const hitR = mo.kind==='rush'?6 : 8;
    if(G.invuln<=0 && Math.abs(mo.x-G.px)<hitR && Math.abs(mo.y-G.py)<hitR){ hurt(); }
  }
  G.mobs=G.mobs.filter(mo=>!mo.dead);

  // ---- CRATES: spawn occasionally; open on contact ----
  G.crateCd--;
  if(G.crateCd<=0 && G.cratesSpawned<BALANCE.crate.maxPerStage && G.state==='play' && !G.bossDowned){
    spawnCrate();
    G.cratesSpawned++;
    G.crateCd = BALANCE.crate.nextCdMin + Math.random()*BALANCE.crate.nextCdSpread;  // next crate timer
  }
  for(const cr of G.crates){
    if(cr.opened) continue;
    cr.t += 0.1; cr.life++;
    // contact check — small radius so you have to actually touch it
    if(Math.abs(cr.x-G.px)<7 && Math.abs(cr.y-G.py)<7){
      openCrate(cr);
    }
  }
  // remove opened crates after a beat (let the burst play out)
  G.crates=G.crates.filter(cr=>!(cr.opened && cr.life>30));
  if(G.crateMsgT>0) G.crateMsgT--;

  // ---- boss spit (drifts; suckable hazard, fades over time) ----
  for(const e of G.ebullets){ e.t++; e.x+=e.vx; e.y+=e.vy; e.vx*=0.995; e.vy*=0.995; }
  G.ebullets=G.ebullets.filter(e=>!e.dead && e.t<600 && e.x>-20 && e.x<WW+20 && e.y>-20 && e.y<WH+20 && Math.hypot(e.x-STATION.x,e.y-STATION.y)>SAFE_R);

  // ---- MISSILES: fly straight, can't be sucked, damage even while sucking ----
  for(const m of G.missiles){ m.t++; if(m.warn>0) m.warn--; m.x+=m.vx; m.y+=m.vy; }
  if(G.invuln<=0){
    for(const m of G.missiles){
      if(m.dead) continue;
      if(Math.abs(m.x-G.px)<5 && Math.abs(m.y-G.py)<5){
        m.dead=true; hurt();
        burst(m.x,m.y,'o',10,2);
        shockwave(m.x, m.y, '#fb923c', 24, 14);
        sparks(m.x, m.y, '#fde047', 6, 2.4);
        break;
      }
    }
  }
  G.missiles=G.missiles.filter(m=>!m.dead && m.x>-12 && m.x<WW+12 && m.y>-12 && m.y<WH+12 && m.t<400 && Math.hypot(m.x-STATION.x,m.y-STATION.y)>SAFE_R);

  // ---- FLAME ORBS (GOMILLA): straight projectile, not suckable, contact damage ----
  for(const f of G.flameOrbs){ f.t++; f.x+=f.vx; f.y+=f.vy; }
  if(G.invuln<=0){
    for(const f of G.flameOrbs){
      if(f.dead) continue;
      if(Math.abs(f.x-G.px)<10 && Math.abs(f.y-G.py)<10){
        f.dead=true; hurt();
        shockwave(f.x, f.y, '#fb923c', 36, 18);
        sparks(f.x, f.y, '#fbbf24', 10, 2.4);
        break;
      }
    }
  }
  G.flameOrbs=G.flameOrbs.filter(f=>!f.dead && f.t<f.life && f.x>-20 && f.x<WW+20 && f.y>-20 && f.y<WH+20 && Math.hypot(f.x-STATION.x,f.y-STATION.y)>SAFE_R);

  // ---- player hit by boss spit (not while sucking) ----
  if(G.invuln<=0 && !G.sucking){
    for(const e of G.ebullets){
      if(Math.abs(e.x-G.px)<5 && Math.abs(e.y-G.py)<5){ e.dead=true; hurt(); break; }
    }
  }
  // contact with boss body
  if(G.boss && G.boss.awake && !G.boss.dead && G.invuln<=0 &&
     Math.abs(G.boss.x-G.px)<G.boss.w/2 && Math.abs(G.boss.y-G.py)<G.boss.h/2){
    hurt();
    // IRON HUSK dash: extra push back so player gets knocked aside
    if(G.boss.spr==='boss2' && G.boss.dashFire>0){
      const ka = G.boss.dashAng;
      G.px += Math.cos(ka)*14; G.py += Math.sin(ka)*14;
      G.px = Math.max(20, Math.min(WW-20, G.px));
      G.py = Math.max(20, Math.min(WH-20, G.py));
      shockwave(G.px, G.py, '#fbbf24', 28, 18);
      G.shake = Math.max(G.shake, 6);
    }
  }
  // JUNK CORE satellites: orbiting junk pieces deal contact damage
  if(G.boss && G.boss.awake && !G.boss.dead && G.boss.spr==='boss' && G.invuln<=0){
    const orbR = 22;
    for(let i=0;i<G.boss.orbCount;i++){
      const a = G.boss.orbAng + (i*Math.PI*2/G.boss.orbCount);
      const ox = G.boss.x + Math.cos(a)*orbR;
      const oy = G.boss.y + Math.sin(a)*orbR;
      if(Math.abs(ox-G.px)<6 && Math.abs(oy-G.py)<6){
        hurt();
        shockwave(ox, oy, '#c084fc', 22, 14);
        sparks(ox, oy, '#e879f9', 6, 2.0);
        break;
      }
    }
  }

  // ---- docking: unload cargo -> ammo. Upgrades come from a SEPARATE, slower meter. ----
  const onStation = Math.abs(G.px-STATION.x)<STATION.w/2 && Math.abs(G.py-STATION.y)<STATION.h/2+4;
  // mission complete: when docked while boss is down, open menu.
  // postBossMenuShown locks the menu for the current dock; it clears once the player
  // leaves the station, so re-docking will re-open the menu (no permanent lock-out).
  if(onStation && G.bossDowned && !G.postBossMenuShown && G.state==='play'){
    G.state='postBoss';
    G.sucking=false; pointer=null; anchor=null; moveId=null;
    return;
  }
  if(!onStation && G.postBossMenuShown){
    G.postBossMenuShown=false;  // re-arm so next dock re-opens the menu
  }
  if(onStation && G.cargo>0 && G.dockCd<=0){
    const gained=Math.floor(G.cargo/UNLOAD_PER_AMMO);
    if(gained>=1){
      const spent=gained*UNLOAD_PER_AMMO;
      G.ammo+=gained; G.unloaded+=gained;
      G.cargo-=spent;
      SFX.dock(); burst(STATION.x, STATION.y, 'y', 10, 1.6);
      // upgrade progress: needs more junk per pick as you level up
      G.puProgress += spent;
      while(G.puProgress >= puNeedNow()){ G.puProgress -= puNeedNow(); G.puPicks++; }
      if(G.puPicks>0) openPick();
      G.dockCd=8;
    } else { G.dockCd=20; }
  }

  // ---- player compressed shots ----
  for(const sh of G.shots){
    // record trail BEFORE moving, so the head leads the streak
    sh.trail.push({x:sh.x, y:sh.y});
    if(sh.trail.length>8) sh.trail.shift();
    sh.x+=(sh.vx||0); sh.y+=sh.vy; sh.life--;
  }
  // shot vs boss
  if(G.boss && !G.boss.dead){
    const b=G.boss;
    for(const sh of G.shots){
      if(sh.done) continue;
      if(Math.abs(sh.x-b.x)<b.w/2+sh.r && Math.abs(sh.y-b.y)<b.h/2+sh.r){
        sh.done=true; hitBoss(sh.dmg||10);
        G.shake = Math.max(G.shake, 2.5);
        burst(sh.x,sh.y,'w',10,1.8); burst(sh.x,sh.y,'c',6,1.2);
        shockwave(sh.x, sh.y, '#a7ffd0', 22, 12);
        sparks(sh.x, sh.y, '#fbbf24', 6, 2.0);
        SFX.bosshit();
      }
    }
  }
  // shot vs mobs — damage scales with PWR, and pierce lets a shot hit multiple
  for(const sh of G.shots){
    if(sh.done) continue;
    for(const mo of G.mobs){
      if(mo.dead) continue;
      if(Math.abs(sh.x-mo.x)<mo.r+sh.r && Math.abs(sh.y-mo.y)<mo.r+sh.r){
        // PWR-scaled mob damage (was hardcoded 2-or-1).
        const md = Math.max(1, Math.ceil((sh.dmg||10) / 6));
        mo.hp -= md;
        // Piercing: keep going for sh.pierce more hits before consuming the shot.
        sh.hits = (sh.hits||0) + 1;
        if(sh.hits > (sh.pierce||0)) sh.done = true;
        burst(sh.x,sh.y,'w',6,1.4); SFX.bosshit();
        if(mo.hp<=0){
          mo.dead=true;
          const k = MOB_KIND[mo.kind] || MOB_KIND.base;
          burst(mo.x,mo.y,'r',12,1.6);
          shockwave(mo.x, mo.y, k.glow||'#fb7185', 24, 14);
          sparks(mo.x, mo.y, k.glow||'#fb7185', 8, 2.2);
          smoke(mo.x, mo.y, 3);
          G.shake = Math.max(G.shake, 2);
          // drop junk
          for(let i=0;i<(k.drops||3);i++) spawnJunk(mo.x+(Math.random()*16-8), mo.y+(Math.random()*16-8), JUNK_KEYS[Math.floor(Math.random()*JUNK_KEYS.length)], 0);
          // SPLIT: spawn 2 smaller offspring (which can't split again)
          if(k.splits){
            for(let s=0;s<2;s++){
              const a=Math.random()*6.283;
              const ox=mo.x+Math.cos(a)*10, oy=mo.y+Math.sin(a)*10;
              spawnMob(ox, oy, 'base');
              // tag them weaker
              const child = G.mobs[G.mobs.length-1];
              child.hp = 2;
            }
          }
        }
        break;
      }
    }
  }
  // shots hitting obstacles: blocked (no junk respawn — clean stop)
  for(const sh of G.shots){
    if(sh.done) continue;
    for(const o of G.obstacles){
      if(Math.hypot(sh.x-o.x, sh.y-o.y) < o.r+sh.r){
        sh.done=true; burst(sh.x,sh.y,'w',6,1.2);
        break;
      }
    }
  }
  // a shot whose life runs out without hitting -> breaks back into junk (the gimmick)
  for(const sh of G.shots){
    if(sh.life<=0 && !sh.done){
      sh.done=true; G.missed++; SFX.rebreak();
      for(let i=0;i<3;i++) spawnJunk(sh.x+(Math.random()*30-15), sh.y+(Math.random()*30-15), 'scrap', 0);
      burst(sh.x,sh.y,'r',14,2.2);
      shockwave(sh.x, sh.y, '#ef4444', 20, 12);
      G.missFlash = 24;
    }
  }
  G.shots=G.shots.filter(sh=>!sh.done && sh.x>-10 && sh.x<WW+10 && sh.y>-10 && sh.y<WH+10);

  // ---- particles (no gravity in space) — per-kind physics ----
  for(const p of G.parts){
    p.life--;
    if(p.kind==='ring'){ p.r += (p.maxR||30)/(p.maxLife||18); }
    else if(p.kind==='smoke'){ p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.size = (p.size||2)+0.04; }
    else if(p.kind==='spark'){
      p.trail = p.trail || []; p.trail.push({x:p.x,y:p.y}); if(p.trail.length>4) p.trail.shift();
      p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93;
    }
    else { p.x+=p.vx; p.y+=p.vy; p.vx*=0.96; p.vy*=0.96; }
  }
  G.parts=G.parts.filter(p=>p.life>0);

  // ---- shields: orbit + intercept any enemy projectile that touches them ----
  if(G.shields && G.shields.length){
    // shared orbit phase + even index offsets → shields stay equally spaced (never overlap)
    G.shieldPhase += 0.06; if(G.shieldPhase > Math.PI*2) G.shieldPhase -= Math.PI*2;
    // intercept ebullets (boss spit AND gunner red) and missiles
    const tryBlock = (arr) => {
      for(const e of arr){
        if(e.dead) continue;
        const n=G.shields.length;
        for(let i=n-1; i>=0; i--){
          const ang = G.shieldPhase + (i/n)*Math.PI*2;
          const sxw = G.px + Math.cos(ang)*SHIELD_R;
          const syw = G.py + Math.sin(ang)*SHIELD_R;
          if(Math.abs(e.x-sxw)<SHIELD_HIT && Math.abs(e.y-syw)<SHIELD_HIT){
            e.dead = true;
            G.shields.splice(i,1);
            burst(sxw, syw, 'c', 8, 1.5);
            shockwave(sxw, syw, '#5eead4', 14, 12);
            SFX.bosshit();
            break;
          }
        }
      }
    };
    tryBlock(G.ebullets);
    tryBlock(G.missiles);
    tryBlock(G.flameOrbs);   // GOMILLA 炎弾もシールドで弾き落とせる
  }

  // ---- cleaner drones: orbit, auto-vacuum into their own buffer, and ferry it
  // into the ship tank whenever there's room. Each drone holds 50% of the ship
  // tank, so total capacity = ship + Σ drones. ----
  if(G.cleanDrones && G.cleanDrones.length){
    const CAP=cargoCap(), dcap=droneCap(), n=G.cleanDrones.length;
    // one shared orbit phase + an even index offset per drone, so any number of
    // drones always stay equally spaced (never bunch up / overlap).
    G.dronePhase -= 0.045; if(G.dronePhase < 0) G.dronePhase += Math.PI*2;
    for(let di=0; di<n; di++){
      const dr=G.cleanDrones[di];
      if(dr.cargo==null) dr.cargo=0;
      const ang = G.dronePhase + (di/n)*Math.PI*2;
      dr.x = G.px + Math.cos(ang)*DRONE_R;
      dr.y = G.py + Math.sin(ang)*DRONE_R;
      // ferry buffered junk into the ship tank when the ship has room
      if(dr.cargo>0 && G.cargo<CAP){ const mv=Math.min(dr.cargo, CAP-G.cargo); G.cargo+=mv; dr.cargo-=mv; }
      // vacuum nearby junk into this drone's own buffer (only if it has room)
      if(dr.cargo < dcap){
        for(const j of G.junk){
          if(j.dead) continue;
          const jx=dr.x-j.x, jy=dr.y-j.y, jd=Math.hypot(jx,jy)||1;
          if(jd < DRONE_RANGE){
            const pull=(1-jd/DRONE_RANGE)*0.7;
            j.vx+=jx/jd*pull; j.vy+=jy/jd*pull;
            if(jd<8){ swallowToDrone(dr,j); if(dr.cargo>=dcap) break; }
          }
        }
      }
    }
  }

  // ---- drifting nebula clouds (slow ambient motion) ----
  if(G.clouds){
    for(const cl of G.clouds){
      cl.x += cl.vx; cl.y += cl.vy; cl.phase += 0.008;
      if(cl.x<-cl.r) cl.x = WW+cl.r;
      if(cl.x>WW+cl.r) cl.x = -cl.r;
      if(cl.y<-cl.r) cl.y = WH+cl.r;
      if(cl.y>WH+cl.r) cl.y = -cl.r;
    }
  }

  // ---- cleanliness reflects how much of the world's junk is left ----
  // initial = junk count at stage start. dirty counts both world junk AND
  // boss-spit ebullets (which are suckable). Boss spit pushes % down; clears push it up.
  // Clamped at 0% so heavy spit can't make the meter go negative.
  {
    const initial = G.totalJunkAtStart || 1;
    let dirty = G.junk.length;
    for(const e of G.ebullets){ if(!e.fromMob) dirty++; }
    const target = Math.max(0, 1 - dirty / initial);
    G.cleanliness += (target - G.cleanliness) * 0.05;
  }
  // brief HUD cue timers
  if(G.missFlash>0) G.missFlash--;
  if(G.healFlash>0) G.healFlash--;

  if(G.hp<=0 && G.state==='play'){ G.state='over'; G.t=0; stopBGM(); }
}

function hurt(){
  // Shield consumes the hit instead of HP (no damage at all to the player)
  if(G.shields && G.shields.length > 0){
    const n=G.shields.length, i=n-1, ang=G.shieldPhase + (i/n)*Math.PI*2;
    G.shields.pop();
    const sxw = G.px + Math.cos(ang)*SHIELD_R, syw = G.py + Math.sin(ang)*SHIELD_R;
    burst(sxw, syw, 'c', 12, 1.6);
    shockwave(sxw, syw, '#5eead4', 22, 14);
    sparks(sxw, syw, '#a7ffd0', 8, 2.0);
    SFX.bosshit();
    G.invuln = BALANCE.player.invulnShieldAbsorb;   // brief i-frames so a swarm doesn't strip all shields at once
    G.shake = Math.max(G.shake, 3);
    return;
  }
  G.hp--; G.invuln=BALANCE.player.invulnHit; SFX.hurt();
  G.shake = Math.max(G.shake, 6);
  burst(G.px,G.py,'r',16,1.8);
  shockwave(G.px, G.py, '#ef4444', 36, 18);
  sparks(G.px, G.py, '#fb7185', 10, 2.4);
  G.flashHp = 12;     // red screen flash on hit
  G.hitStop = 4;      // brief freeze for impact weight
  // dropping cargo on hit would be harsh for a proto; keep it but lose a little
  G.cargo=Math.max(0, G.cargo-BALANCE.player.cargoLossOnHit);
  if(G.hp<=0){ G.state='over'; G.t=0; stopBGM(); }
}

/* ============================================================
   RENDER
   ============================================================ */
function px(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(x|0,y|0,w,h); }
// font picker:
//   - small Latin (sc<2) → Silkscreen Bold (condensed 4x6 pixel UI font, fits the
//     existing tight HUD layout that was designed for DotGothic16)
//   - large Latin (sc>=2 headings) → Press Start 2P (bold arcade bitmap)
//   - Japanese (kana/kanji/fullwidth) → DotGothic16 at min 10px
const HAS_JP = /[　-鿿＀-￯]/;
function fontFor(str, sc){
  sc = sc || 1;
  if(HAS_JP.test(str)){
    const sz = Math.max(10, Math.round(8*sc));
    return sz + "px 'DotGothic16',monospace";
  }
  if(sc >= 2){
    return (8*sc) + "px 'Press Start 2P','Silkscreen',monospace";
  }
  // small UI: Silkscreen Regular at its native 8px — pixel-perfect, condensed
  return (8*sc) + "px 'Silkscreen','Press Start 2P',monospace";
}
function text(str,x,y,col,sc){ sc=sc||1; ctx.font=fontFor(str,sc); ctx.textBaseline='top'; ctx.fillStyle=col; ctx.fillText(str,x|0,y|0); }
function center(str,y,col,sc){ sc=sc||1; ctx.font=fontFor(str,sc); const w=ctx.measureText(str).width; text(str,(LW-w)/2,y,col,sc); }
// glowing text — a neon halo behind the glyphs
// === CRT TERMINAL palette: cyberpunk neon green (Matrix / HUD vibe) ===
// keys keep the "amber*" names for code stability — only the color values change
const UI = {
  bg0:'#020a04',   // near-black with green tint (high contrast for neon)
  bg1:'#061a0c',   // panel fill
  bezel:'#0c2818', // metallic dark green frame
  bezelHi:'#1a5a36',
  amber:'#22ff88',     // PRIMARY: vibrant neon green (Matrix glow)
  amberDim:'#0aaa55',  // mid neon green
  amberDark:'#073a20', // deep shadow
  amberHi:'#a7ffd0',   // electric mint highlight
  red:'#ff3050',       // sharper neon red
  redDim:'#5c1020',
  green:'#aaff33',     // lime accent (extra zing for LEDs)
  greenDim:'#3a7020',
  text:'#c8ffdd',      // bright mint text
  textDim:'#5a9a78',
  scan:'rgba(0,0,0,0.22)',  // slightly stronger scanlines for the gritty look
};

function glowText(str,x,y,col,sc,glow){
  // shadowBlur is one of the most expensive 2D canvas ops on mobile.
  // Cap the blur radius and skip the duplicate fillText that we used for
  // extra brightness — one fillText with a moderate blur already glows fine.
  sc=sc||1; ctx.font=fontFor(str,sc); ctx.textBaseline='top';
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=Math.min(glow||6, 6); ctx.fillStyle=col;
  ctx.fillText(str,x|0,y|0); ctx.restore();
}
function glowCenter(str,y,col,sc,glow){
  sc=sc||1; ctx.font=fontFor(str,sc); const w=ctx.measureText(str).width;
  glowText(str,(LW-w)/2,y,col,sc,glow);
}
// returns x immediately right of `label` rendered at (x, sc) — for chaining label+value pairs
function rightOf(label, x, sc, gap){
  sc = sc || 1; ctx.font = fontFor(label, sc);
  return Math.round(x + ctx.measureText(label).width + (gap == null ? 4 : gap));
}
// returns x for right-aligning `str` to a right edge — for "v1.0" / "QUEUE: n" etc.
function rightAlign(str, rightEdge, sc){
  sc = sc || 1; ctx.font = fontFor(str, sc);
  return Math.round(rightEdge - ctx.measureText(str).width);
}
// auto-shrinks `str` to the largest integer scale (≤maxScale) that fits in maxWidth, then center-draws.
// pass `glow` (number) to use glowCenter, otherwise plain center.
function fitCenter(str, y, col, maxScale, maxWidth, glow){
  maxScale = maxScale || 2;
  maxWidth = maxWidth || (LW - 12);
  for(let sc = maxScale; sc >= 1; sc--){
    ctx.font = fontFor(str, sc);
    if(ctx.measureText(str).width <= maxWidth){
      if(glow) glowCenter(str, y, col, sc, glow);
      else center(str, y, col, sc);
      return;
    }
  }
  // even sc=1 didn't fit — draw anyway at sc=1 (will clip but at least readable)
  if(glow) glowCenter(str, y, col, 1, glow); else center(str, y, col, 1);
}
// logo-style multi-layer text: drop shadow + dark outline + main fill + glow
function logoText(str,x,y,mainCol,outlineCol,shadowCol,sc){
  sc=sc||1; ctx.font=fontFor(str,sc); ctx.textBaseline='top';
  if(shadowCol){ ctx.fillStyle=shadowCol; ctx.fillText(str,(x+3)|0,(y+3)|0); }
  if(outlineCol){
    ctx.fillStyle=outlineCol;
    for(let dx=-1;dx<=1;dx++) for(let dy=-1;dy<=1;dy++){
      if(dx===0&&dy===0) continue;
      ctx.fillText(str,(x+dx)|0,(y+dy)|0);
    }
  }
  ctx.save(); ctx.shadowColor=mainCol; ctx.shadowBlur=6;
  ctx.fillStyle=mainCol; ctx.fillText(str,x|0,y|0);
  ctx.restore();
}
function logoCenter(str,y,mainCol,outlineCol,shadowCol,sc){
  sc=sc||1; ctx.font=fontFor(str,sc); const w=ctx.measureText(str).width;
  logoText(str,(LW-w)/2,y,mainCol,outlineCol,shadowCol,sc);
}
// rounded-ish neon rectangle outline with soft glow
function neonRect(x,y,w,h,col,glow,fill){
  ctx.save();
  if(fill){ ctx.fillStyle=fill; ctx.fillRect(x,y,w,h); }
  ctx.shadowColor=col; ctx.shadowBlur=glow||6; ctx.strokeStyle=col; ctx.lineWidth=1;
  ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
  ctx.restore();
}
function glowDisc(cx,cy,r,col,glow){
  ctx.save(); ctx.shadowColor=col; ctx.shadowBlur=glow||6; drawDisc(cx,cy,r,col); ctx.restore();
}

const SIZE_KB = 101; // filled after build
function drawBudget(x,y){
  const cells=20, used=Math.max(1,Math.round(cells*SIZE_KB/1440)), cw=3, ch=4, gap=1;
  for(let i=0;i<cells;i++) px(x+i*(cw+gap), y, cw, ch, i<used?UI.amber:UI.amberDark);
  text(SIZE_KB+'KB / 1440KB', x, y+ch+2, UI.amberDim, 1);
}

// world->screen helpers
function sx(wx){ return wx - G.camX + (G.shake?(Math.random()-0.5)*G.shake:0); }
function sy(wy){ return wy - G.camY + (G.shake?(Math.random()-0.5)*G.shake:0); }
function onScreen(wx,wy,m){ m=m||16; const x=wx-G.camX, y=wy-G.camY; return x>-m&&x<LW+m&&y>-m&&y<LH+m; }

function drawScene(){
  const c=G.cleanliness;
  const theme = (stageCfg(G.stage||1) || {}).theme || {tint:'#02100a',accent:'#22ff88'};
  // base black with a slight stage-tinted overlay (sets the area's "mood")
  ctx.fillStyle = UI.bg0; ctx.fillRect(-4,-4,LW+8,LH+8);
  ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle=theme.tint; ctx.fillRect(-4,-4,LW+8,LH+8); ctx.restore();
  // soft neon-green afterglow around the player — pulses subtly.
  // pre-baked offscreen aura (_aura, built at init) drawn at player pos;
  // pulse is just a globalAlpha mod so we avoid createRadialGradient every frame.
  if(_aura){
    const pgx = sx(G.px), pgy = sy(G.py);
    const pulse = 0.7 + 0.3 * Math.sin(G.t * 0.08);
    ctx.save(); ctx.globalAlpha = pulse;
    ctx.drawImage(_aura, (pgx - 120)|0, (pgy - 120)|0);
    ctx.restore();
  }
  const accent = theme.accent;
  // animated nebula clouds — soft radial gradients drifting through the void
  // (low alpha + multi-layered concentric discs gives "soft background" feel
  // without needing ctx.filter blur, which is GPU-expensive on mobile)
  if(G.clouds){
    ctx.save();
    for(const cl of G.clouds){
      const par=0.30, x=cl.x-G.camX*par, y=cl.y-G.camY*par;
      if(x+cl.r<-4||x-cl.r>LW+4||y+cl.r<-4||y-cl.r>LH+4) continue;
      const pulse = 0.10 + 0.06*Math.sin(cl.phase);
      const grad = ctx.createRadialGradient(x,y,0, x,y,cl.r);
      grad.addColorStop(0, cl.col); grad.addColorStop(0.55, cl.col); grad.addColorStop(1, cl.col);
      ctx.globalAlpha = pulse;
      // approximated soft glow via three concentric discs (faster than per-pixel gradient on every frame)
      drawDisc(x|0, y|0, cl.r|0, cl.col);
      ctx.globalAlpha = pulse*0.7;
      drawDisc(x|0, y|0, (cl.r*0.65)|0, cl.col);
      ctx.globalAlpha = pulse*0.4;
      drawDisc(x|0, y|0, (cl.r*0.35)|0, cl.col);
    }
    ctx.restore();
  }
  // distant planets — slow parallax, dim glow body, optional ring
  // (alpha layering replaces ctx.filter blur which was a mobile FPS killer)
  if(G.planets){
    ctx.save();
    for(const pl of G.planets){
      const x = pl.x - G.camX*pl.par, y = pl.y - G.camY*pl.par;
      if(x+pl.r+10<0 || x-pl.r-10>LW || y+pl.r+10<0 || y-pl.r-10>LH) continue;
      // pastel color: stage accent lerped 65% toward white so the body reads as
      // distant, hazy atmosphere rather than a saturated foreground object.
      // Cached per-planet so we don't recompute every frame.
      const pastel = pl._pastel || (pl._pastel = lerpHex(pl.col, '#ffffff', 0.65));
      // fake-blur halo: 2 oversized low-alpha discs (cheap, no ctx.filter cost).
      ctx.globalAlpha = 0.04;
      drawDisc(x|0, y|0, (pl.r+5)|0, pastel);
      ctx.globalAlpha = 0.06;
      drawDisc(x|0, y|0, (pl.r+2)|0, pastel);
      // back ring half (drawn behind body)
      if(pl.hasRing){
        ctx.globalAlpha = 0.10;
        ctx.strokeStyle = pastel; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(x|0, y|0, pl.r+5, Math.max(2,pl.r*0.28), 0, 3.14, 6.28); ctx.stroke();
      }
      // soft body — pastel and translucent, so it sits behind the action.
      ctx.globalAlpha = 0.12;
      drawDisc(x|0, y|0, pl.r|0, pastel);
      // shaded inner disc — slight volume hint, still pastel
      ctx.globalAlpha = 0.16;
      drawDisc((x-pl.r*0.25)|0, (y-pl.r*0.25)|0, (pl.r*0.7)|0, pastel);
      // craters — softened dark grey instead of pure black so they fit the haze
      ctx.globalAlpha = 0.18;
      for(const cr of pl.craters||[]){
        const cx = x + Math.cos(cr.a)*pl.r*cr.r, cy = y + Math.sin(cr.a)*pl.r*cr.r;
        px(cx|0, cy|0, cr.sz, cr.sz, '#333');
      }
      // front ring half (over body)
      if(pl.hasRing){
        ctx.globalAlpha = 0.14;
        ctx.strokeStyle = pastel; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(x|0, y|0, pl.r+5, Math.max(2,pl.r*0.28), 0, 0, 3.14); ctx.stroke();
      }
    }
    ctx.restore();
  }
  // sparse stars — phosphor pinpricks
  for(const s of G.stars){
    const par = s.s*0.18;
    let xx = (s.x - G.camX*par) % LW; if(xx<0) xx+=LW;
    let yy = (s.y - G.camY*par) % LH; if(yy<0) yy+=LH;
    const tw=0.5+0.5*Math.sin(G.t*0.05+s.tw);
    ctx.save(); ctx.globalAlpha=0.4*tw;
    px(xx,yy,1,1, s.s===1?UI.amberDark:s.s===2?UI.amberDim:UI.amberHi); ctx.restore();
  }
  // CYBER GRID — neon lines + accent-colored dot intersections per stage
  ctx.save();
  ctx.globalAlpha=0.08; ctx.strokeStyle=UI.amberDim; ctx.lineWidth=1;
  for(let gx=0; gx<=WW; gx+=64){
    const sgx=sx(gx); if(sgx<-2||sgx>LW+2) continue;
    ctx.beginPath(); ctx.moveTo(sgx,Math.max(0,sy(0))); ctx.lineTo(sgx,Math.min(LH,sy(WH))); ctx.stroke();
  }
  for(let gy=0; gy<=WH; gy+=64){
    const sgy=sy(gy); if(sgy<-2||sgy>LH+2) continue;
    ctx.beginPath(); ctx.moveTo(Math.max(0,sx(0)),sgy); ctx.lineTo(Math.min(LW,sx(WW)),sgy); ctx.stroke();
  }
  // accent-colored dots at intersections
  ctx.globalAlpha=0.5; ctx.fillStyle=accent;
  for(let gx=0; gx<=WW; gx+=64){
    const sgx=sx(gx); if(sgx<-2||sgx>LW+2) continue;
    for(let gy=0; gy<=WH; gy+=64){
      const sgy=sy(gy); if(sgy<-2||sgy>LH+2) continue;
      ctx.fillRect(sgx,sgy,1,1);
    }
  }
  ctx.restore();
  // world boundary — amber bracket corners (not a full rectangle)
  ctx.save(); ctx.globalAlpha=0.7; ctx.strokeStyle=UI.amberDim; ctx.lineWidth=1;
  const x0=sx(0),y0=sy(0),x1=sx(WW),y1=sy(WH), bl=12;
  ctx.beginPath();
  // four corner brackets
  for(const cn of [[x0,y0,1,1],[x1,y0,-1,1],[x0,y1,1,-1],[x1,y1,-1,-1]]){
    ctx.moveTo(cn[0], cn[1]+bl*cn[3]); ctx.lineTo(cn[0],cn[1]); ctx.lineTo(cn[0]+bl*cn[2], cn[1]);
  }
  ctx.stroke(); ctx.restore();
  // strong vignette — pre-baked once per LW change, then just drawImage'd
  if(_vig) ctx.drawImage(_vig, 0, 0);
}
// CRT scanlines + subtle flicker, drawn over EVERYTHING at the end
function drawCRTOverlay(){
  // horizontal scanlines (every other row dimmed)
  ctx.save(); ctx.globalAlpha=1; ctx.fillStyle=UI.scan;
  for(let y=0; y<LH; y+=2) ctx.fillRect(0,y,LW,1);
  ctx.restore();
  // very faint flicker
  if((G.t%50)<2){ ctx.save(); ctx.globalAlpha=0.06; ctx.fillStyle='#fff'; ctx.fillRect(0,0,LW,LH); ctx.restore(); }
  // BEZEL frame — the monitor's physical edge
  ctx.save();
  // outer dark bezel
  ctx.fillStyle=UI.bezel;
  ctx.fillRect(0,0,LW,4); ctx.fillRect(0,LH-4,LW,4);
  ctx.fillRect(0,0,4,LH); ctx.fillRect(LW-4,0,4,LH);
  // inner highlight line
  ctx.fillStyle=UI.bezelHi; ctx.globalAlpha=0.6;
  ctx.fillRect(4,4,LW-8,1); ctx.fillRect(4,LH-5,LW-8,1);
  ctx.fillRect(4,4,1,LH-8); ctx.fillRect(LW-5,4,1,LH-8);
  // tiny LED indicator at top-right (power)
  ctx.globalAlpha=1; ctx.fillStyle=UI.green;
  ctx.fillRect(LW-10,6,2,2);
  ctx.restore();
}
function drawDisc(cx,cy,r,col){ ctx.fillStyle=col; for(let y=-r;y<=r;y++){ const w=Math.floor(Math.sqrt(r*r-y*y)); ctx.fillRect((cx-w)|0,(cy+y)|0,w*2,1);} }
function lerpHex(a,b,t){
  t=Math.max(0,Math.min(1,t));
  const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  const r=Math.round(pa[0]+(pb[0]-pa[0])*t), g=Math.round(pa[1]+(pb[1]-pa[1])*t), bl=Math.round(pa[2]+(pb[2]-pa[2])*t);
  return 'rgb('+r+','+g+','+bl+')';
}

/* ---------- per-stage obstacle draw routines (dispatched by o.kind) ---------- */
// ROCK — angular asteroid silhouette + craters (the "real" rock)
function drawObstacleRock(ox, oy, o, sd, tint){
  const N = 7, pts = [];
  for(let i=0;i<N;i++){
    const a = (i/N)*6.283 + sd;
    const rr = o.r * (0.82 + ((sd*13 + i*7)%100)/100 * 0.35);
    pts.push([ox + Math.cos(a)*rr, oy + Math.sin(a)*rr]);
  }
  // shadow (offset)
  ctx.save(); ctx.globalAlpha=0.5; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.moveTo(pts[0][0]+2, pts[0][1]+2);
  for(let i=1;i<N;i++) ctx.lineTo(pts[i][0]+2, pts[i][1]+2);
  ctx.closePath(); ctx.fill(); ctx.restore();
  // body + dark outline
  ctx.fillStyle='#5a4a32'; ctx.strokeStyle='#1a1208'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
  for(let i=1;i<N;i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // lit upper-left face
  drawDisc((ox-o.r*0.35)|0, (oy-o.r*0.35)|0, Math.max(2,(o.r*0.4)|0), '#8a7048');
  // craters
  for(let i=0;i<2;i++){
    const a=sd*3+i*2.4, cr=o.r*0.22;
    const cx=ox+Math.cos(a)*o.r*0.35, cy=oy+Math.sin(a)*o.r*0.35;
    drawDisc(cx|0, cy|0, cr|0, '#2a1c10');
    px((cx+cr*0.5)|0, (cy+cr*0.4)|0, 2, 1, '#6a5238');
  }
  // accent glint (uses stage tint = amber)
  const t2 = G.t*0.03 + sd;
  if((Math.floor(t2)%6)===0){
    px(ox+Math.cos(t2)*o.r*0.5|0, oy+Math.sin(t2)*o.r*0.5|0, 1, 1, tint);
  }
}
// NEBULA — soft purple dust cloud, semi-transparent overlapping discs, slow drift phase
function drawObstacleNebula(ox, oy, o, sd, tint){
  const phase = G.t*0.01 + sd;
  ctx.save();
  // 3 stacked discs, low alpha, sized down toward center → gradient effect
  const cols = ['#3a1a4a', '#6a2a8a', '#a855f7'];
  const sizes = [1.0, 0.7, 0.45];
  for(let i=0;i<3;i++){
    ctx.globalAlpha = 0.35 - i*0.05;
    const dx = Math.cos(phase + i*2.1)*1.5, dy = Math.sin(phase + i*2.1)*1.5;
    drawDisc((ox+dx)|0, (oy+dy)|0, (o.r*sizes[i])|0, cols[i]);
  }
  // a few stars-in-dust accent pixels
  ctx.globalAlpha = 0.9;
  for(let i=0;i<3;i++){
    const a = (sd*5+i*2.1)%6.283, rr = o.r*0.55*((sd*4+i)%1);
    px((ox+Math.cos(a)*rr)|0, (oy+Math.sin(a)*rr)|0, 1, 1, i===0?tint:'#fde047');
  }
  ctx.restore();
}
// WRECK — broken ship hull: rectangle body + rivets + one antenna stick
function drawObstacleWreck(ox, oy, o, sd, tint){
  const tilt = ((sd*7)%1 - 0.5) * 0.4;  // small rotation
  const w = o.r*1.6, h = o.r*1.0;
  ctx.save();
  ctx.translate(ox, oy); ctx.rotate(tilt);
  // shadow
  ctx.globalAlpha = 0.45; ctx.fillStyle='#000';
  ctx.fillRect(-w/2+2, -h/2+2, w, h);
  ctx.globalAlpha = 1;
  // hull body — gray metal with darker outline
  ctx.fillStyle='#1a2030'; ctx.fillRect(-w/2-1, -h/2-1, w+2, h+2);
  ctx.fillStyle='#4a5060'; ctx.fillRect(-w/2, -h/2, w, h);
  // top stripe (deck)
  ctx.fillStyle='#6a7080'; ctx.fillRect(-w/2, -h/2, w, 2);
  // rivets — 4 dots along the lower edge
  ctx.fillStyle='#1a1a20';
  for(let i=0;i<4;i++){
    ctx.fillRect(-w/2 + 2 + i*(w-4)/3, h/2-2, 1, 1);
  }
  // gash — a dark diagonal slash so it reads as 'broken'
  ctx.strokeStyle='#0a0a10'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-w/3, -h/4); ctx.lineTo(w/3, h/3); ctx.stroke();
  // antenna — 1 thin vertical line poking up
  ctx.fillStyle='#7a8090'; ctx.fillRect(((sd*11)%w - w/2)|0, -h/2-4, 1, 4);
  ctx.fillStyle = tint; ctx.fillRect(((sd*11)%w - w/2)|0, -h/2-5, 1, 1);
  ctx.restore();
}
// DANGER — dead satellite: dark body + pulsing red warning light
function drawObstacleDanger(ox, oy, o, sd, tint){
  const pulse = 0.5 + 0.5*Math.sin(G.t*0.08 + sd);
  const w = o.r*1.4, h = o.r*1.4;
  ctx.save();
  // shadow
  ctx.globalAlpha = 0.45; ctx.fillStyle='#000';
  ctx.fillRect(ox-w/2+2, oy-h/2+2, w, h); ctx.globalAlpha=1;
  // body — dark gray with outline
  ctx.fillStyle='#0a0a0e'; ctx.fillRect(ox-w/2-1, oy-h/2-1, w+2, h+2);
  ctx.fillStyle='#2a2a32'; ctx.fillRect(ox-w/2, oy-h/2, w, h);
  // solar panels — wings on each side (dark blue)
  ctx.fillStyle='#1a2848';
  ctx.fillRect(ox-w/2-3, oy-1, 3, 3);
  ctx.fillRect(ox+w/2,   oy-1, 3, 3);
  // central warning beacon — red, glowing, pulses
  ctx.shadowColor='#ef4444'; ctx.shadowBlur = 4 + pulse*4;
  drawDisc(ox|0, oy|0, 2, pulse>0.5 ? '#ef4444' : '#fb7185');
  ctx.shadowBlur=0;
  // cracked panel dot — single dim accent
  px((ox-w/4)|0, (oy+h/4)|0, 1, 1, tint);
  ctx.restore();
}
// HIVE — pulsing alien egg / organic blob, magenta with rim glow
function drawObstacleHive(ox, oy, o, sd, tint){
  const pulse = 0.6 + 0.4*Math.sin(G.t*0.05 + sd);
  // shadow
  ctx.save(); ctx.globalAlpha = 0.5; ctx.fillStyle='#000';
  drawDisc((ox+2)|0, (oy+2)|0, (o.r*0.95)|0, '#000');
  ctx.restore();
  // base blob — 2 overlapping deep magenta discs (off-center for organic feel)
  drawDisc(ox|0, oy|0, (o.r+1)|0, '#3a0a2a');
  drawDisc((ox + Math.cos(sd*3)*o.r*0.2)|0, (oy + Math.sin(sd*3)*o.r*0.2)|0, o.r|0, '#7a1a5a');
  // top body — bright magenta
  drawDisc((ox-o.r*0.2)|0, (oy-o.r*0.2)|0, (o.r*0.7)|0, '#c026d3');
  // rim glow accent — pulsing tint dot at the top
  ctx.save(); ctx.shadowColor = tint; ctx.shadowBlur = 2 + pulse*4;
  drawDisc((ox-o.r*0.3)|0, (oy-o.r*0.4)|0, Math.max(1,(o.r*0.25)|0), pulse>0.5 ? '#f0abfc' : tint);
  ctx.restore();
  // 2 dim 'cell' specks
  px((ox+o.r*0.3)|0, (oy+o.r*0.1)|0, 1, 1, '#3a0a2a');
  px((ox-o.r*0.1)|0, (oy+o.r*0.4)|0, 1, 1, '#3a0a2a');
}
const OBSTACLE_DRAW = {
  NEBULA: drawObstacleNebula,
  ROCK:   drawObstacleRock,
  WRECK:  drawObstacleWreck,
  DANGER: drawObstacleDanger,
  HIVE:   drawObstacleHive,
};
